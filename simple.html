<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#080806;color:#F0EBE1;font-family:'Raleway',sans-serif;font-weight:300;overflow-x:hidden;-webkit-font-smoothing:antialiased;opacity:0;animation:bodyIn .6s .1s forwards}
img{max-width:100%;display:block}

:root{
  --gold:#C4A35A;
  --gold-lt:#E8D5A3;
  --gold-dk:#7A6535;
  --bg:#080806;
  --bg2:#0F0E0C;
  --bg3:#151310;
  --text:#F0EBE1;
  --dim:#8A8478;
  --border:rgba(196,163,90,0.12)
}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:100;height:80px;padding:0 6%;display:flex;align-items:center;transition:background .4s,border-color .4s;border-bottom:1px solid transparent}
#nav.scrolled{background:rgba(8,8,6,.95);backdrop-filter:blur(16px);border-color:var(--border)}
.nav-inner{width:100%;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px}
.nav-logo img{height:42px;object-fit:contain;filter:brightness(1.15)}
.nav-links{display:flex;list-style:none;gap:40px;justify-content:center}
.nav-links a{text-decoration:none;font-size:9.5px;font-weight:300;letter-spacing:3.5px;text-transform:uppercase;color:rgba(240,235,225,.7);position:relative;padding-bottom:4px;transition:color .25s}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--gold);transition:width .35s ease}
.nav-links a:hover{color:var(--gold-lt)}
.nav-links a:hover::after{width:100%}
.lang-sw{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.lang-btn{background:none;border:none;font-family:'Raleway',sans-serif;font-size:10px;font-weight:300;letter-spacing:2px;color:var(--dim);cursor:pointer;padding:4px 3px;transition:color .2s}
.lang-btn.active,.lang-btn:hover{color:var(--gold)}
.lang-sep{color:var(--dim);opacity:.3;font-size:8px;user-select:none}

/* HERO */
#hero{position:relative;height:100vh;min-height:680px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.h-bg{position:absolute;inset:0;background:url('https://res.cloudinary.com/dphbptped/image/upload/w_1920,q_auto,f_auto/v1779853245/Hero-luxury_xjrqqm.jpg') center/cover no-repeat;transform:scale(1.08);transition:transform 11s ease}
.h-bg.ready{transform:scale(1)}
.h-ov{position:absolute;inset:0;background:linear-gradient(155deg,rgba(8,8,6,.2) 0%,rgba(8,8,6,.52) 45%,rgba(8,8,6,.9) 100%)}
.h-cnt{position:relative;z-index:2;text-align:center;padding:0 24px;max-width:900px;margin-top:22vh}
#fLogo{position:fixed;z-index:101;cursor:pointer;pointer-events:auto;height:auto;transform-origin:top left}
.h-orn{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:36px;opacity:0;animation:up .9s .25s forwards}
.h-orn::before,.h-orn::after{content:'';width:52px;height:1px;background:var(--gold)}
.h-orn-txt{font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);font-weight:400}
.h-title{font-family:'Cormorant Garamond',serif;font-size:clamp(50px,8.5vw,105px);font-weight:300;font-style:normal;line-height:1.02;color:var(--text);letter-spacing:-.02em;opacity:0;animation:up .9s .42s forwards}
.h-title em{font-style:italic;color:var(--gold-lt)}
.h-slogan{font-family:'Cormorant Garamond',serif;font-size:clamp(14px,1.6vw,20px);font-weight:300;font-style:italic;color:rgba(232,213,163,.78);margin:18px 0 8px;letter-spacing:.04em;opacity:0;animation:up .9s .52s forwards}
.h-loc{font-size:10px;font-weight:300;letter-spacing:5px;text-transform:uppercase;color:rgba(232,213,163,.65);margin:16px 0 48px;opacity:0;animation:up .9s .6s forwards}
.h-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;opacity:0;animation:up .9s .78s forwards}
.btn-g{display:inline-block;padding:16px 38px;background:var(--gold);color:var(--bg);text-decoration:none;font-size:9px;font-weight:500;letter-spacing:3.5px;text-transform:uppercase;transition:background .25s,transform .2s;white-space:nowrap;cursor:pointer;border:none}
.btn-g:hover{background:var(--gold-lt);transform:translateY(-2px)}
.btn-o{display:inline-block;padding:15px 38px;border:1px solid rgba(196,163,90,.42);color:rgba(240,235,225,.82);text-decoration:none;font-size:9px;font-weight:300;letter-spacing:3.5px;text-transform:uppercase;transition:border-color .25s,color .25s,transform .2s;white-space:nowrap;cursor:pointer;background:none}
.btn-o:hover{border-color:var(--gold);color:var(--gold-lt);transform:translateY(-2px)}

/* MANIFESTO */
#manifesto{padding:120px 6%;background:var(--bg2);text-align:center}
.gline{display:flex;align-items:center;justify-content:center;gap:14px;margin:36px auto}
.gline::before{content:'';flex:1;max-width:90px;height:1px;background:linear-gradient(to right,transparent,var(--gold))}
.gline::after{content:'';flex:1;max-width:90px;height:1px;background:linear-gradient(to left,transparent,var(--gold))}
.gdot{width:5px;height:5px;background:var(--gold);transform:rotate(45deg);flex-shrink:0}
.mf-ti{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,4.5vw,56px);font-weight:300;font-style:italic;color:var(--text);margin-bottom:28px;line-height:1.2}
.mf-tx{max-width:720px;margin:0 auto;font-size:15px;line-height:2;color:rgba(240,235,225,.6);font-weight:300;letter-spacing:.02em}

/* SECTIONS COMMONS */
.sec{padding:104px 0}
.s-in{max-width:1300px;margin:0 auto;padding:0 6%}
.s-hd{text-align:center;margin-bottom:72px}
.s-ey{display:block;font-size:9px;font-weight:300;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.s-ti{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,2.8vw,32px);font-weight:300;letter-spacing:5px;text-transform:uppercase;color:var(--text)}
.s-div{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:20px}
.s-div::before,.s-div::after{content:'';width:28px;height:1px;background:var(--gold);opacity:.38}

/* SERVICES */
#services{background:var(--bg)}
.srv-layout{display:grid;grid-template-columns:1.5fr 1fr;gap:1px;background:rgba(196,163,90,.07)}
.srv-c{background:var(--bg2);padding:56px 52px;position:relative;overflow:hidden;transition:background .5s;cursor:default;min-height:560px;display:flex;flex-direction:column;justify-content:flex-end}
.srv-c.srv-link{cursor:pointer}
.srv-c.srv-link:hover{background:#131209}
.srv-stat{position:relative;z-index:2;display:flex;align-items:baseline;gap:10px;margin-bottom:24px;opacity:0;transform:translateY(10px);transition:opacity .6s ease,transform .6s ease}
.srv-stat.srv-stat-vis{opacity:1;transform:none}
.srv-stat-n{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,4.2vw,58px);font-weight:300;color:var(--gold-lt);line-height:1}
.srv-stat-l{font-size:9px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--dim)}
.srv-bg-img{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity .9s ease,transform 1.2s ease;transform:scale(1.06);z-index:0}
.srv-bg-dim{position:absolute;inset:0;background:linear-gradient(110deg,rgba(8,8,6,.88) 0%,rgba(8,8,6,.7) 55%,rgba(8,8,6,.45) 100%);z-index:1;opacity:0;transition:opacity .9s ease}
.srv-c.srv-visible .srv-bg-img{opacity:1;transform:scale(1)}
.srv-c.srv-visible .srv-bg-dim{opacity:1}
.srv-c.srv-visible .srv-num{opacity:.13}
.srv-c.srv-visible .srv-line{width:72px}
.srv-c.srv-visible .srv-ti{color:var(--gold-lt)}
.srv-c.srv-visible .srv-arr{opacity:.55;transform:none}
.srv-inner{position:relative;z-index:2}
.srv-num{font-family:'Cormorant Garamond',serif;font-size:96px;font-weight:300;color:var(--gold);opacity:.05;line-height:1;position:absolute;top:12px;right:28px;pointer-events:none;transition:opacity .6s;z-index:2}
.srv-line{width:32px;height:1px;background:var(--gold);margin-bottom:28px;transition:width .6s cubic-bezier(.16,1,.3,1);opacity:.7}
.srv-ti{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,2vw,26px);font-weight:400;font-style:italic;color:var(--text);margin-bottom:12px;line-height:1.2;transition:color .5s}
.srv-c:first-child .srv-ti{font-size:clamp(26px,3.2vw,40px)}
.srv-c:first-child .srv-num{font-size:140px;top:0}
.srv-de{font-size:12.5px;line-height:1.9;color:var(--dim);font-weight:300;max-width:640px}
.srv-arr{position:absolute;bottom:32px;right:40px;width:20px;height:20px;opacity:0;transform:translateX(-6px);transition:opacity .4s,transform .4s;z-index:2}
.srv-arr svg{width:100%;height:100%;color:var(--gold)}

/* PROPERTIES */
#properties{background:var(--bg3)}
.prp-g{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.prp-c{background:var(--bg2);overflow:hidden;cursor:pointer;transition:transform .3s}
.prp-c:hover{transform:translateY(-5px)}
.prp-img{position:relative;height:400px;overflow:hidden}
.prp-img img{width:100%;height:100%;object-fit:cover;transition:transform .75s}
.prp-c:hover .prp-img img{transform:scale(1.07)}
.prp-ov{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(8,8,6,.82) 100%)}
.prp-badges{position:absolute;top:16px;right:16px;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.prp-badge{background:var(--gold);color:var(--bg);font-size:8px;font-weight:500;letter-spacing:3px;padding:5px 12px;text-transform:uppercase}
.prp-body{padding:26px 28px 32px}
.prp-nm{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;font-style:italic;color:var(--text);margin-bottom:6px}
.prp-lc{font-size:9px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.prp-ds{font-size:12px;line-height:1.82;color:var(--dim);margin-bottom:18px}
.prp-pr{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;color:var(--gold-lt);margin-bottom:20px}
.prp-cta{font-size:9px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(--gold);text-decoration:none;border-bottom:1px solid rgba(196,163,90,.3);padding-bottom:2px;transition:color .2s,border-color .2s;display:inline-block}
.prp-cta:hover{color:var(--gold-lt);border-color:var(--gold-lt)}
.prp-more-wrap{text-align:center;margin-top:52px}
.prp-count{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:20px}
.btn-more{padding:14px 52px;border:none;color:var(--gold-lt);font-family:'Raleway',sans-serif;font-size:9px;font-weight:300;letter-spacing:4px;text-transform:uppercase;cursor:pointer;background:transparent;transition:color .3s;text-decoration:none;display:inline-block}
.btn-more:hover{color:var(--gold)}

/* INVEST */
#invest{background:var(--bg);text-align:center}
.st-g{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(196,163,90,.06);max-width:1040px;margin:0 auto 72px}
.st-c{padding:52px 24px;background:var(--bg2)}
.st-n{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5vw,64px);font-weight:300;color:var(--gold);line-height:1;margin-bottom:12px}
.st-l{font-size:9.5px;font-weight:300;letter-spacing:2px;text-transform:uppercase;color:var(--dim);line-height:1.75;white-space:pre-line}
.inv-tx{max-width:660px;margin:0 auto;font-size:14px;line-height:2;color:rgba(240,235,225,.58);font-weight:300}

/* TESTIMONIALS */
#testimonials{background:var(--bg2)}
.tst-g{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(196,163,90,.05)}
.tst-c{padding:52px 38px;background:var(--bg);position:relative;overflow:hidden}
.tst-c::before{content:'\201C';position:absolute;top:18px;left:26px;font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--gold);opacity:.1;line-height:1;font-style:italic;pointer-events:none}
.tst-tx{font-family:'Cormorant Garamond',serif;font-size:16.5px;font-style:italic;font-weight:300;line-height:1.88;color:rgba(240,235,225,.74);margin-bottom:30px}
.tst-au{font-size:9.5px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:12px}
.tst-au::before{content:'';width:22px;height:1px;background:var(--gold);opacity:.5}

/* CONTACT */
#contact{background:var(--bg)}
.cnt-g{display:grid;grid-template-columns:1fr 1.35fr;gap:80px;align-items:start}
.cnt-tagline{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,2.8vw,34px);font-weight:300;font-style:italic;color:var(--text);margin-bottom:48px;line-height:1.45}
.cnt-lbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.cnt-val{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text);margin-bottom:32px;line-height:1.7}
.cnt-val a{text-decoration:none;color:var(--text);transition:color .2s}
.cnt-val a:hover{color:var(--gold-lt)}
.frm-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.frm-r{margin-bottom:24px}
.frm-r label{display:block;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.frm-r input,.frm-r textarea,.frm-r select{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(196,163,90,.2);padding:10px 0;color:var(--text);font-family:'Raleway',sans-serif;font-size:14px;font-weight:300;outline:none;transition:border-color .3s;appearance:none;-webkit-appearance:none}
.frm-r input::placeholder,.frm-r textarea::placeholder{color:rgba(138,132,120,.55);font-weight:300;font-size:13px}
.frm-r input:focus,.frm-r textarea:focus,.frm-r select:focus{border-color:var(--gold)}
.frm-r textarea{resize:none;height:90px}
.frm-r select option{background:#151310;color:var(--text)}
.frm-3{display:grid;grid-template-columns:90px 1fr 1fr;gap:20px}
.frm-r input.dial-inp{text-align:center;letter-spacing:2px}
.frm-sub{width:100%;padding:17px;background:var(--gold);color:var(--bg);border:none;font-family:'Raleway',sans-serif;font-size:9.5px;font-weight:500;letter-spacing:4px;text-transform:uppercase;cursor:pointer;transition:background .25s;margin-top:8px}
.frm-sub:hover{background:var(--gold-lt)}

/* FOOTER */
footer{padding:56px 6%;background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:28px;text-align:center}
.ft-logo img{height:50px;object-fit:contain;opacity:.82}
.ft-links{display:flex;gap:36px;flex-wrap:wrap;justify-content:center}
.ft-links a{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color .2s}
.ft-links a:hover{color:var(--gold)}
.ft-social{display:flex;gap:20px;align-items:center;justify-content:center}
.ft-social a{color:var(--dim);transition:color .25s,transform .2s;display:flex;align-items:center}
.ft-social a:hover{color:var(--gold);transform:translateY(-2px)}
.ft-social svg{width:18px;height:18px;fill:currentColor}
.ft-cp{font-size:10px;color:var(--dim);opacity:.4;letter-spacing:.5px}

/* WHATSAPP FLOTANTE */
#waFloat{position:fixed;bottom:32px;right:32px;z-index:400;width:52px;height:52px;background:var(--bg2);border:1px solid rgba(196,163,90,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(0,0,0,.4);cursor:pointer;text-decoration:none;opacity:0;pointer-events:none;transform:translateY(12px);transition:opacity .5s ease,transform .5s ease,border-color .25s,box-shadow .25s}
#waFloat.visible{opacity:1;pointer-events:auto;transform:translateY(0)}
#waFloat:hover{border-color:var(--gold);box-shadow:0 6px 32px rgba(196,163,90,.2)}
#waFloat svg{width:24px;height:24px;fill:var(--gold)}

/* ANIMATIONS */
@keyframes bodyIn{to{opacity:1}}
@keyframes up{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.18}55%{opacity:.85}}
.rev{opacity:0;transform:translateY(28px);transition:opacity .85s ease,transform .85s ease}
.rev.vis{opacity:1;transform:none}

/* RESPONSIVE */
@media(max-width:1024px){
  .srv-layout{grid-template-columns:1fr}
  .srv-c{min-height:420px}
  .tst-g{grid-template-columns:repeat(2,1fr)}
  .prp-g{grid-template-columns:repeat(2,1fr)}
  .st-g{grid-template-columns:repeat(2,1fr)}
  .cnt-g{grid-template-columns:1fr;gap:52px}
  .nav-links{display:none}
}
@media(max-width:600px){
  .tst-g,.prp-g{grid-template-columns:1fr}
  .st-g{grid-template-columns:1fr}
  .h-btns{flex-direction:column;align-items:center}
  .btn-g,.btn-o{width:260px;text-align:center}
  .frm-2{grid-template-columns:1fr}
  .frm-3{grid-template-columns:72px 1fr;}.frm-3 .frm-r:last-child{grid-column:1/-1}
}
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <div class="nav-inner">
    <a href="#"><img id="navLogoRef" src="https://res.cloudinary.com/dphbptped/image/upload/w_200,q_auto,f_auto/v1779854302/20260526_225431_0000_lgxhla.png" alt="LRS" style="height:42px;object-fit:contain;filter:brightness(1.15);opacity:0"></a>
    <ul class="nav-links" id="navLinks"></ul>
    <div class="lang-sw">
      <button class="lang-btn" data-lang="fr">FR</button>
      <span class="lang-sep">◆</span>
      <button class="lang-btn active" data-lang="en">EN</button>
      <span class="lang-sep">◆</span>
      <button class="lang-btn" data-lang="es">ES</button>
      <span class="lang-sep">◆</span>
      <button class="lang-btn" data-lang="it">IT</button>
    </div>
  </div>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="h-bg" id="hBg"></div>
  <div class="h-ov"></div>
  <div class="h-cnt">
    <div class="h-orn"><span class="h-orn-txt" id="hEy"></span></div>
    <h1 class="h-title" id="hTi"></h1>
    <p class="h-slogan" id="hSlogan"></p>
    <div class="h-btns">
      <button class="btn-g" id="hCta1" onclick="goToWhatsApp()"></button>
      <a href="#services" class="btn-o" id="hCta2"></a>
    </div>
  </div>
</section>

<!-- MANIFESTO -->
<section id="manifesto">
  <div class="s-in">
    <div class="gline"><div class="gdot"></div></div>
    <h2 class="mf-ti rev" id="mfTi"></h2>
    <p class="mf-tx rev" id="mfTx"></p>
    <div class="gline"><div class="gdot"></div></div>
  </div>
</section>

<!-- SERVICES -->
<section id="services" class="sec">
  <div class="s-in">
    <div class="s-hd rev">
      <span class="s-ey" id="sEy"></span>
      <h2 class="s-ti" id="sTi"></h2>
      <div class="s-div"><div class="gdot"></div></div>
    </div>
    <div class="srv-layout" id="srvG"></div>
  </div>
</section>

<!-- OPPORTUNITIES -->
<section id="properties" class="sec">
  <div class="s-in">

    <p class="cnt-val"><a href="mailto:info@luxuryrealestatesignature.com">info@luxuryrealestatesignature.com</a></p>`;
  
  g('cntForm').innerHTML = `
    <div style="text-align:center;padding:40px 32px;background:var(--bg2);border:1px solid var(--border)">
      <p style="font-family:'Cormorant Garamond',serif;font-size:20px;margin-bottom:20px;color:var(--text)">${{es:'¿Listo para el siguiente paso?',en:'Ready for the next step?',fr:'Prêt pour la prochaine étape?',it:'Pronto per il prossimo passo?'}[lang]}</p>
      <button class="btn-g" onclick="goToWhatsApp()" style="font-size:10px;padding:18px 40px">${t.c1}</button>
    </div>`;
  
  g('ftLk').innerHTML = `<a href="#">${t.ftL}</a><a href="#">${t.ftP}</a><a href="#">${t.ftC}</a>`;
  g('ftCp').textContent = t.ftCp;
  observe();
}

// Lang switcher
document.querySelectorAll('.lang-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    lang = b.dataset.lang;
    document.querySelectorAll('.lang-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.documentElement.lang = lang;
    render();
  });
});

// Scroll effects
window.addEventListener('scroll',()=>{
  const sy = window.scrollY;
  document.getElementById('nav').classList.toggle('scrolled', sy > 50);
  const wa = document.getElementById('waFloat');
  if(wa) wa.classList.toggle('visible', sy > window.innerHeight * 0.6);
},{passive:true});

// Hero Ken Burns
setTimeout(()=>document.getElementById('hBg').classList.add('ready'), 100);

// Reveal on scroll
function observe(){
  const ob = new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('vis'); });
  },{threshold:0.1});
  document.querySelectorAll('.rev').forEach(el=>ob.observe(el));
}

// Service cards scroll effect
setTimeout(()=>{
  const srvObs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ e.target.classList.toggle('srv-visible', e.isIntersecting); });
  },{threshold:0.35});
  document.querySelectorAll('.srv-c').forEach(el=>srvObs.observe(el));
},50);

// Floating logo
window.addEventListener('load', function(){
  const fLogo = document.getElementById('fLogo');
  if(!fLogo) return;
  function lerp(a,b,t){return a+(b-a)*t}
  function eio(t){return t<.5?2*t*t:-1+(4-2*t)*t}
  function updateLogo(){
    const sy=window.scrollY, vw=window.innerWidth, vh=window.innerHeight;
    const p=eio(Math.min(sy/(vh*.42),1));
    const startW=Math.min(200,vw*.32), startX=(vw-startW)/2, startY=vh*.05;
    const ref=document.getElementById('navLogoRef');
    const nr=ref.getBoundingClientRect();
    const endW=44, endX=nr.left, endY=nr.top;
    fLogo.style.left=lerp(startX,endX,p)+'px';
    fLogo.style.top=lerp(startY,endY,p)+'px';
    fLogo.style.width=lerp(startW,endW,p)+'px';
  }
  window.addEventListener('scroll',updateLogo,{passive:true});
  window.addEventListener('resize',updateLogo);
  updateLogo();
});

// Init
document.querySelectorAll('.lang-btn').forEach(b=>{ b.classList.toggle('active', b.dataset.lang === lang); });
document.documentElement.lang = lang;
render();
</script>
