<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#080806;color:#F0EBE1;font-family:'Raleway',sans-serif;font-weight:300;overflow-x:hidden;-webkit-font-smoothing:antialiased;opacity:0;animation:bodyIn .6s .1s forwards}
img{max-width:100%;display:block}

:root{
  --gold:#C4A35A;
  --gold-lt:#E8D5A3;
  --gold-dk:#7A6535;
  --bg:#080806;
  --bg2:#0F0E0C;
  --bg3:#151310;
  --text:#F0EBE1;
  --dim:#8A8478;
  --border:rgba(196,163,90,0.12)
}

/* ── NAV ── */
#nav{position:fixed;top:0;left:0;right:0;z-index:100;height:80px;padding:0 6%;display:flex;align-items:center;transition:background .4s,border-color .4s;border-bottom:1px solid transparent}
#nav.scrolled{background:rgba(8,8,6,.95);backdrop-filter:blur(16px);border-color:var(--border)}
.nav-inner{width:100%;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px}
.nav-logo img{height:42px;object-fit:contain;filter:brightness(1.15)}
.nav-links{display:flex;list-style:none;gap:40px;justify-content:center}
.nav-links a{text-decoration:none;font-size:9.5px;font-weight:300;letter-spacing:3.5px;text-transform:uppercase;color:rgba(240,235,225,.7);position:relative;padding-bottom:4px;transition:color .25s}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--gold);transition:width .35s ease}
.nav-links a:hover{color:var(--gold-lt)}
.nav-links a:hover::after{width:100%}
.lang-sw{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.lang-btn{background:none;border:none;font-family:'Raleway',sans-serif;font-size:10px;font-weight:300;letter-spacing:2px;color:var(--dim);cursor:pointer;padding:4px 3px;transition:color .2s}
.lang-btn.active,.lang-btn:hover{color:var(--gold)}
.lang-sep{color:var(--dim);opacity:.3;font-size:8px;user-select:none}

/* ── HERO ── */
#hero{position:relative;height:100vh;min-height:680px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.h-bg{position:absolute;inset:0;background:url('https://res.cloudinary.com/dphbptped/image/upload/w_1920,q_auto,f_auto/v1779853245/Hero-luxury_xjrqqm.jpg') center/cover no-repeat;transform:scale(1.08);transition:transform 11s ease}
.h-bg.ready{transform:scale(1)}
.h-ov{position:absolute;inset:0;background:linear-gradient(155deg,rgba(8,8,6,.2) 0%,rgba(8,8,6,.52) 45%,rgba(8,8,6,.9) 100%)}
.h-cnt{position:relative;z-index:2;text-align:center;padding:0 24px;max-width:900px;margin-top:22vh}
#fLogo{position:fixed;z-index:101;cursor:pointer;pointer-events:auto;height:auto;transform-origin:top left}
.h-orn{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:36px;opacity:0;animation:up .9s .25s forwards}
.h-orn::before,.h-orn::after{content:'';width:52px;height:1px;background:var(--gold)}
.h-orn-txt{font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);font-weight:400}
.h-title{font-family:'Cormorant Garamond',serif;font-size:clamp(50px,8.5vw,105px);font-weight:300;font-style:normal;line-height:1.02;color:var(--text);letter-spacing:-.02em;opacity:0;animation:up .9s .42s forwards}
.h-title em{font-style:italic;color:var(--gold-lt)}
.h-slogan{font-family:'Cormorant Garamond',serif;font-size:clamp(14px,1.6vw,20px);font-weight:300;font-style:italic;color:rgba(232,213,163,.78);margin:18px 0 8px;letter-spacing:.04em;opacity:0;animation:up .9s .52s forwards}
.h-loc{font-size:10px;font-weight:300;letter-spacing:5px;text-transform:uppercase;color:rgba(232,213,163,.65);margin:16px 0 48px;opacity:0;animation:up .9s .6s forwards}
.h-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;opacity:0;animation:up .9s .78s forwards}
.btn-g{display:inline-block;padding:16px 38px;background:var(--gold);color:var(--bg);text-decoration:none;font-size:9px;font-weight:500;letter-spacing:3.5px;text-transform:uppercase;transition:background .25s,transform .2s;white-space:nowrap}
.btn-g:hover{background:var(--gold-lt);transform:translateY(-2px)}
.btn-o{display:inline-block;padding:15px 38px;border:1px solid rgba(196,163,90,.42);color:rgba(240,235,225,.82);text-decoration:none;font-size:9px;font-weight:300;letter-spacing:3.5px;text-transform:uppercase;transition:border-color .25s,color .25s,transform .2s;white-space:nowrap}
.btn-o:hover{border-color:var(--gold);color:var(--gold-lt);transform:translateY(-2px)}

/* ── MANIFESTO ── */
#manifesto{padding:120px 6%;background:var(--bg2);text-align:center}
.gline{display:flex;align-items:center;justify-content:center;gap:14px;margin:36px auto}
.gline::before{content:'';flex:1;max-width:90px;height:1px;background:linear-gradient(to right,transparent,var(--gold))}
.gline::after{content:'';flex:1;max-width:90px;height:1px;background:linear-gradient(to left,transparent,var(--gold))}
.gdot{width:5px;height:5px;background:var(--gold);transform:rotate(45deg);flex-shrink:0}
.mf-ti{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,4.5vw,56px);font-weight:300;font-style:italic;color:var(--text);margin-bottom:28px;line-height:1.2}
.mf-tx{max-width:720px;margin:0 auto;font-size:15px;line-height:2;color:rgba(240,235,225,.6);font-weight:300;letter-spacing:.02em}

/* ── SECTIONS COMMONS ── */
.sec{padding:104px 0}
.s-in{max-width:1300px;margin:0 auto;padding:0 6%}
.s-hd{text-align:center;margin-bottom:72px}
.s-ey{display:block;font-size:9px;font-weight:300;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.s-ti{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,2.8vw,32px);font-weight:300;letter-spacing:5px;text-transform:uppercase;color:var(--text)}
.s-div{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:20px}
.s-div::before,.s-div::after{content:'';width:28px;height:1px;background:var(--gold);opacity:.38}

/* ── ABOUT ── */
#about{background:var(--bg3)}
.ab-intro{max-width:800px;margin:0 auto 56px;text-align:center;font-size:15px;line-height:2;color:rgba(240,235,225,.62);font-weight:300}
/* Acordeón */
.ab-accordion{border-top:1px solid rgba(196,163,90,.12);margin-bottom:64px}
.ab-item{border-bottom:1px solid rgba(196,163,90,.12);overflow:hidden}
.ab-trigger{width:100%;background:none;border:none;padding:28px 0;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:24px;text-align:left}
.ab-trigger-left{display:flex;align-items:center;gap:24px}
.ab-trigger-num{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:300;color:var(--gold);opacity:.5;letter-spacing:3px;min-width:28px}
.ab-trigger-ti{font-family:'Cormorant Garamond',serif;font-size:clamp(18px,2vw,24px);font-weight:400;font-style:italic;color:var(--text);transition:color .3s}
.ab-item.open .ab-trigger-ti{color:var(--gold-lt)}
.ab-trigger-icon{width:18px;height:18px;position:relative;flex-shrink:0;margin-right:4px}
.ab-trigger-icon::before,.ab-trigger-icon::after{content:'';position:absolute;background:var(--gold);transition:transform .4s,opacity .4s}
.ab-trigger-icon::before{width:18px;height:1px;top:50%;left:0;transform:translateY(-50%)}
.ab-trigger-icon::after{width:1px;height:18px;left:50%;top:0;transform:translateX(-50%)}
.ab-item.open .ab-trigger-icon::after{transform:translateX(-50%) rotate(90deg);opacity:0}
/* Panel desplegable */
.ab-panel{max-height:0;overflow:hidden;transition:max-height .55s cubic-bezier(.16,1,.3,1)}
.ab-item.open .ab-panel{max-height:600px}
.ab-panel-inner{padding:4px 0 36px 52px}
.ab-panel-txt{font-size:13.5px;line-height:2;color:rgba(240,235,225,.58);font-weight:300;max-width:780px}
.ab-panel-txt p{margin-bottom:16px}
.ab-panel-txt p:last-child{margin-bottom:0}
.ab-vals{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px}
.ab-val{font-size:11px;font-weight:300;letter-spacing:1.5px;color:rgba(240,235,225,.5);padding:7px 18px;border:1px solid rgba(196,163,90,.15)}
/* Closing */
.ab-closing{max-width:760px;margin:0 auto;text-align:center;font-family:'Cormorant Garamond',serif;font-size:clamp(17px,2vw,24px);font-weight:300;font-style:italic;line-height:1.7;color:rgba(240,235,225,.7)}

/* ── TEAM (5th about accordion item) ── */
.ab-item.open.ab-team-item .ab-panel{max-height:2400px}
.tm-loading{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--dim);padding:32px 0;animation:pulse 1.8s ease-in-out infinite}
.tm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:32px 24px}
.tm-card{display:flex;flex-direction:column;align-items:center;text-align:center;gap:0}
.tm-avatar{width:88px;height:88px;border-radius:50%;object-fit:cover;border:1px solid rgba(196,163,90,.18);filter:grayscale(18%);transition:filter .4s,transform .4s;background:var(--bg2)}
.tm-card:hover .tm-avatar{filter:grayscale(0);transform:scale(1.04)}
.tm-avatar-fallback{width:88px;height:88px;border-radius:50%;background:var(--bg2);border:1px solid rgba(196,163,90,.12);display:flex;align-items:center;justify-content:center;color:var(--gold);opacity:.3;font-family:'Cormorant Garamond',serif;font-size:28px;font-style:italic}
.tm-name{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:400;color:var(--text);margin-top:16px;margin-bottom:4px;line-height:1.2}
.tm-role{font-size:8px;font-weight:300;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);opacity:.6;margin-bottom:12px}
.tm-socials{display:flex;gap:10px;align-items:center;justify-content:center}
.tm-social{color:var(--dim);transition:color .2s,transform .2s;display:flex;align-items:center}
.tm-social:hover{color:var(--gold);transform:translateY(-2px)}
.tm-social svg{width:13px;height:13px;fill:currentColor}
@media(max-width:600px){
  .tm-grid{grid-template-columns:repeat(2,1fr);gap:28px 16px}
}
@media(max-width:600px){
  .ab-panel-inner{padding:4px 0 28px 28px}
  .ab-trigger{padding:22px 0}
}

/* ── SERVICES ── */
#services{background:var(--bg)}
.srv-layout{display:grid;grid-template-columns:1fr;gap:1px;background:rgba(196,163,90,.07)}
.srv-c:first-child{grid-column:1}
.srv-c{background:var(--bg2);padding:56px 52px;position:relative;overflow:hidden;transition:background .5s;cursor:default;min-height:320px;display:flex;flex-direction:column;justify-content:flex-end}
/* Imagen de fondo — activada por scroll */
.srv-bg-img{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity .9s ease,transform 1.2s ease;transform:scale(1.06);z-index:0}
.srv-bg-dim{position:absolute;inset:0;background:linear-gradient(110deg,rgba(8,8,6,.88) 0%,rgba(8,8,6,.7) 55%,rgba(8,8,6,.45) 100%);z-index:1;opacity:0;transition:opacity .9s ease}
/* Clase activa por IntersectionObserver */
.srv-c.srv-visible .srv-bg-img{opacity:1;transform:scale(1)}
.srv-c.srv-visible .srv-bg-dim{opacity:1}
.srv-c.srv-visible .srv-num{opacity:.13}
.srv-c.srv-visible .srv-line{width:72px}
.srv-c.srv-visible .srv-ti{color:var(--gold-lt)}
.srv-c.srv-visible .srv-arr{opacity:.55;transform:none}
/* Contenido siempre encima */
.srv-inner{position:relative;z-index:2}
/* Número romano decorativo */
.srv-num{font-family:'Cormorant Garamond',serif;font-size:96px;font-weight:300;color:var(--gold);opacity:.05;line-height:1;position:absolute;top:12px;right:28px;pointer-events:none;transition:opacity .6s;z-index:2}
/* Línea animada */
.srv-line{width:32px;height:1px;background:var(--gold);margin-bottom:28px;transition:width .6s cubic-bezier(.16,1,.3,1);opacity:.7}
/* Título */
.srv-ti{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,2vw,26px);font-weight:400;font-style:italic;color:var(--text);margin-bottom:12px;line-height:1.2;transition:color .5s}
/* Descripción */
.srv-de{font-size:12.5px;line-height:1.9;color:var(--dim);font-weight:300;max-width:640px}
/* Flecha */
.srv-arr{position:absolute;bottom:32px;right:40px;width:20px;height:20px;opacity:0;transform:translateX(-6px);transition:opacity .4s,transform .4s;z-index:2}
.srv-arr svg{width:100%;height:100%;color:var(--gold)}
/* Hero card ajustes */
.srv-c:first-child{min-height:420px}
.srv-c:first-child .srv-ti{font-size:clamp(24px,2.8vw,36px)}
.srv-c:first-child .srv-num{font-size:150px;top:4px}
@media(max-width:900px){
  .srv-c{padding:44px 36px}
}
@media(max-width:600px){
  .srv-c{padding:36px 24px}
  .srv-num{font-size:72px}
}

/* ── PROPERTIES ── */
#properties{background:var(--bg3)}
.prp-g{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.prp-c{background:var(--bg2);overflow:hidden;cursor:pointer;transition:transform .3s}
.prp-c:hover{transform:translateY(-5px)}
.prp-c:nth-child(1){transition-delay:0s}.prp-c:nth-child(2){transition-delay:.08s}.prp-c:nth-child(3){transition-delay:.16s}
.prp-img{position:relative;height:400px;overflow:hidden}
.prp-img img{width:100%;height:100%;object-fit:cover;transition:transform .75s}
.prp-c:hover .prp-img img{transform:scale(1.07)}
.prp-ov{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(8,8,6,.82) 100%)}
.prp-badges{position:absolute;top:16px;right:16px;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.prp-badge{background:var(--gold);color:var(--bg);font-size:8px;font-weight:500;letter-spacing:3px;padding:5px 12px;text-transform:uppercase}
.prp-body{padding:26px 28px 32px}
.prp-nm{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;font-style:italic;color:var(--text);margin-bottom:6px}
.prp-lc{font-size:9px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.prp-ds{font-size:12px;line-height:1.82;color:var(--dim);margin-bottom:18px}
.prp-pr{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;color:var(--gold-lt);margin-bottom:20px}
.prp-details{display:flex;gap:20px;margin-bottom:14px;flex-wrap:wrap}
.prp-detail{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}

.filter-bar{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:48px;padding:28px 32px;background:var(--bg2);border:1px solid var(--border)}
.filter-group{display:flex;flex-direction:column;gap:10px;flex:1;min-width:160px}
.filter-lbl{font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--gold)}

.btn-more{padding:14px 52px;border:none;color:var(--gold-lt);font-family:'Raleway',sans-serif;font-size:9px;font-weight:300;letter-spacing:4px;text-transform:uppercase;cursor:pointer;background:transparent;transition:color .3s;text-decoration:none;display:inline-block}

.prp-lk{font-size:9px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(--gold);text-decoration:none;border-bottom:1px solid rgba(196,163,90,.3);padding-bottom:2px;transition:color .2s,border-color .2s;display:inline-block}

.st-n{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5vw,64px);font-weight:300;color:var(--gold);line-height:1;margin-bottom:12px}
.st-l{font-size:9.5px;font-weight:300;letter-spacing:2px;text-transform:uppercase;color:var(--dim);line-height:1.75;white-space:pre-line}
.inv-tx{max-width:660px;margin:0 auto;font-size:14px;line-height:2;color:rgba(240,235,225,.58);font-weight:300}

/* ── TESTIMONIALS ── */

.frm-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.frm-r{margin-bottom:24px}

#waFloat:hover{border-color:var(--gold);box-shadow:0 6px 32px rgba(196,163,90,.2)}

/* ── UNIT SELECTOR PANEL ── */

#unitPanel.open{opacity:1;pointer-events:auto}

.unit-box{background:var(--bg2);border-top:2px solid rgba(196,163,90,.3);width:100%;height:88vh;overflow-y:auto;padding:28px 8% 48px;scrollbar-width:thin;scrollbar-color:rgba(196,163,90,.25) transparent;position:relative;transform:translateY(100%);transition:transform .35s cubic-bezier(.16,1,.3,1)}
.unit-box::-webkit-scrollbar{width:4px}
.unit-box::-webkit-scrollbar-track{background:transparent}
.unit-box::-webkit-scrollbar-thumb{background:rgba(196,163,90,.25);border-radius:2px}
.unit-box-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.unit-box-ti{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;font-style:italic;color:var(--text);margin-bottom:0}
.unit-box-sub{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:32px;display:block}
.unit-list{display:flex;flex-direction:column;gap:1px;max-width:900px}
.unit-item{display:grid;grid-template-columns:1fr auto auto;align-items:center;padding:20px 24px;background:var(--bg3);cursor:pointer;transition:background .2s;gap:24px}
.unit-item:hover{background:#1c1a14}
.unit-item-left{display:flex;flex-direction:column;gap:5px}
.unit-item-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;color:var(--text)}
.unit-item-meta{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase}
.unit-item-price{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;color:var(--gold-lt);white-space:nowrap;text-align:right}
.unit-item-arr{color:var(--gold);opacity:.45;font-size:16px;flex-shrink:0}
.unit-item:hover .unit-item-arr{opacity:1}
.unit-close{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:4px;transition:color .2s;line-height:1;flex-shrink:0}
.unit-close:hover{color:var(--gold)}

@keyframes bodyIn{to{opacity:1}}

                  'image[5].url','image[6].url','image[7].url','image[8].url','image[9].url'];

function formatPrice(val){
  if(!val) return '';
  const n = parseFloat(String(val).replace(/[^0-9.]/g,''));
  if(isNaN(n)) return val;
  return '$' + n.toLocaleString('en-US') + ' MXN';
}

// ── Render tarjetas (recibe slice ya filtrado/paginado) ──

function imgUrl(url, w, h){
  if(!url) return '';
  if(url.includes('cloudinary')){
    // URLs con brackets en el public_id fallan con transformaciones — servir original
    if(url.includes('%5B') || url.includes('%5b') || url.includes('%5D') || url.includes('%5d')) return url;
    const t = 'w_'+w+',q_auto,f_auto,c_fill'+(h?',h_'+h:'');
    if(url.includes('/upload/'+t)) return url;
    return url.replace('/upload/', '/upload/'+t+'/');
  }
  return url;
}



function parseListingType(val){
  const v = (val||'').toUpperCase().trim();
  const map = {
    fr:{FOR_SALE:'À Vendre',FOR_SALE_BY_AGENT:'À Vendre',FOR_RENT:'À Louer',FOR_RENT_BY_AGENT:'À Louer',SOLD:'Vendu'},
    en:{FOR_SALE:'For Sale',FOR_SALE_BY_AGENT:'For Sale',FOR_RENT:'For Rent',FOR_RENT_BY_AGENT:'For Rent',SOLD:'Sold'},
    es:{FOR_SALE:'Venta',FOR_SALE_BY_AGENT:'Venta',FOR_RENT:'Renta',FOR_RENT_BY_AGENT:'Renta',SOLD:'Vendido'},
    it:{FOR_SALE:'In Vendita',FOR_SALE_BY_AGENT:'In Vendita',FOR_RENT:'In Affitto',FOR_RENT_BY_AGENT:'In Affitto',SOLD:'Venduto'}
  };
  return (map[lang]&&map[lang][v]) || v.replace(/_/g,' ');
}

function statLabels(){
  return {
    rec: {fr:'Ch.',en:'Beds',es:'Rec.',it:'Cam.'}[lang],
    ban: {fr:'SDB',en:'Baths',es:'Baños',it:'Bagni'}[lang]
  };
}

function formatArea(area, unit){
  if(!area) return '';
  const m2 = parseFloat(area);
  if(isNaN(m2)) return area + ' ' + (unit||'m²');
  const sqft = Math.round(m2 * 10.764);
  return m2 + ' m² · ' + sqft.toLocaleString('en-US') + ' sq ft';
}

function getDesc(p){
  if(lang==='fr' && p['description FR'] && p['description FR'].trim()) return p['description FR'];
  if(lang==='en' && p['description EN'] && p['description EN'].trim()) return p['description EN'];
  if(lang==='it' && p['description IT'] && p['description IT'].trim()) return p['description IT'];
  return p['description']||'';
}

// ── Filtrado ──
// Parse DD/MM/YYYY HH:MM:SS → comparable number
function parseTimestamp(ts){
  if(!ts) return 0;
  const s = String(ts).trim();
  // DD/MM/YYYY HH:MM:SS
  const m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2}):(\d{2})$/);
  if(m) return new Date(+m[3],+m[2]-1,+m[1],+m[4],+m[5],+m[6]).getTime();
  // fallback: try native parse
  const d = new Date(s);
  return isNaN(d) ? 0 : d.getTime();
}

function getFiltered(){
  return allFetched
    .sort((a,b) => parseTimestamp(b['timestamp']||b['Timestamp']||b['TIMESTAMP']) -
                   parseTimestamp(a['timestamp']||a['Timestamp']||a['TIMESTAMP']));
}

// ── Fetch principal ──
function loadProps(){
  if(allFetched.length){ renderFiltered(); return; }
  g('prpG').innerHTML = '<div class="prp-loading">'+L[lang].prpLoading+'</div>';
  Papa.parse(SHEET_CSV,{
    download: true,
    header:   true,
    skipEmptyLines: true,
    complete(res){
      allFetched = res.data.filter(r => IMG_COLS.some(c=>r[c]&&r[c].trim()));
      try {
        renderFiltered();
      } catch(e) {
        console.error('renderFiltered error:', e.message, e.stack);
        renderPropsFromData(allFetched.slice(0, 3));
      }
    },
    error(){
      g('prpG').innerHTML = '<div class="prp-loading" style="color:rgba(196,163,90,.4)">ERROR AL CARGAR</div>';
    }
  });
}


// ── GROUP BY NAME ──
function groupByName(data){
  const parseNum = v => parseFloat(String(v||0).replace(/[^0-9.]/g,''))||0;
  const groups = {};
  data.forEach(p=>{
    const name = (p['Nombre']||'').trim();
    if(!groups[name]) groups[name] = [];
    groups[name].push(p);
  });
  return Object.values(groups).map(units=>{
    // Representative = first item (already sorted by timestamp desc from getFiltered)
    const rep = units[0];
    // Within group: sort units by Unidad alphanumerically
    const sortedUnits = [...units].sort((a,b)=>{
      const ua = String(a['Unidad']||'').trim();
      const ub = String(b['Unidad']||'').trim();
      // Numeric if both are numbers, else alphabetical
      const na = parseNum(ua), nb = parseNum(ub);
      if(na && nb) return na - nb;
      return ua.localeCompare(ub, 'es', {numeric:true});
    });
    return Object.assign({}, rep, {_units: sortedUnits, _unitCount: units.length});
  });
}

// ── ABOUT ACCORDION ──
function toggleAbout(btn, key, label){
  const item = btn.closest('.ab-item');
  const isOpen = item.classList.contains('open');

  // Cerrar todos
  document.querySelectorAll('.ab-item.open').forEach(el=>el.classList.remove('open'));

  if(!isOpen){
    item.classList.add('open');
    // Cargar equipo si es la sección correspondiente y aún no se cargó
    if(key==='equipo'){
      const c = document.getElementById('tmContainer');
      if(c && c.querySelector('.tm-loading')) loadTeam();
    }
    // Analytics — dispara evento cuando usuario abre sección
    if(typeof gtag === 'function'){
      gtag('event','about_section_open',{
        event_category:'About Us',
        event_label: key,
        section_name: label,
        language: lang
      });
    }
  }
}

const ROLE_ORDER = ['president','director','directora','ceo','gerente','manager','coordinador','coordinadora','asesor','asesora','advisor','admin','administrador','administradora'];

function roleRank(rol){
  const r = (rol||'').toLowerCase().trim();
  const idx = ROLE_ORDER.findIndex(k => r.includes(k));
  return idx === -1 ? 99 : idx;
}

function loadTeam(){
  Papa.parse(TEAM_CSV, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(res){
      const container = document.getElementById('tmContainer');
      if(!container) return;

      const rows = (res.data||[]).filter(r=>{
        const status = (r['Status']||'').trim();
        return status === 'TRUE' || status === 'true' || status === '1';
      });

      if(!rows.length){
        container.innerHTML = `<p style="font-size:12px;color:var(--dim);letter-spacing:2px">— TEAM COMING SOON —</p>`;
        return;
      }

      // Ordenar por jerarquía de rol
      rows.sort((a,b) => roleRank(a['Rol']) - roleRank(b['Rol']));

      function cardHTML(r){
        const name   = (r['Assignee']||'').trim();
        const rol    = (r['Rol']||'').trim();
        const picUrl = (r['Pic url']||r['Pic_url']||r['pic url']||'').trim();
        const fb     = (r['Facebook']||'').trim();
        const ig     = (r['Instagram']||'').trim();
        const li     = (r['LinkedIn']||r['Linkedin']||'').trim();
        const yt     = (r['YouTube']||r['Youtube']||r['youtube']||'').trim();

        const initial = name ? name.charAt(0).toUpperCase() : '?';
        const imgEl = picUrl
          ? `<img class="tm-avatar" src="${picUrl}" alt="${name}" loading="lazy" onerror="tmFallback(this)" data-initial="${initial}">`
          : `<div class="tm-avatar-fallback">${initial}</div>`;

        const socials = [
          fb ? `<a class="tm-social" href="${fb.startsWith('http')?fb:'https://'+fb}" target="_blank" rel="noopener" title="Facebook">${FB_SVG}</a>` : '',
          ig ? `<a class="tm-social" href="${ig.startsWith('http')?ig:'https://'+ig}" target="_blank" rel="noopener" title="Instagram">${IG_SVG}</a>` : '',
          li ? `<a class="tm-social" href="${li.startsWith('http')?li:'https://'+li}" target="_blank" rel="noopener" title="LinkedIn">${LI_SVG}</a>` : '',
          yt ? `<a class="tm-social" href="${yt.startsWith('http')?yt:'https://'+yt}" target="_blank" rel="noopener" title="YouTube">${YT_SVG}</a>` : ''
        ].join('');

        return `<div class="tm-card">
          ${imgEl}
          <p class="tm-name">${name}</p>
          <p class="tm-role">${rol}</p>
          ${socials ? `<div class="tm-socials">${socials}</div>` : ''}
        </div>`;
      }

      container.innerHTML = `<div class="tm-grid">${rows.map(r=>cardHTML(r)).join('')}</div>`;
      observe();

      if(typeof gtag === 'function'){
        gtag('event','team_view',{
          event_category:'About Us',
          members_count: rows.length,
          language: lang
        });
      }
    },
    error: function(err){
      console.error('[LRS Team] Error PapaParse:', err);
      const c = document.getElementById('tmContainer');
      if(c) c.innerHTML = `<p style="font-size:11px;letter-spacing:2px;color:var(--dim)">— TEAM UNAVAILABLE —</p>`;
    }
  });
}

function observe(){
  const ob = new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('vis'); });

  document.querySelectorAll('.rev').forEach(el=>ob.observe(el));
}

// ── UNIT SELECTOR ──
let _unitPanelUnits = [];

function openUnitPanel(units){
  const name = units[0]['Nombre']||'';
  g('unitBoxTi').textContent = name;
  g('unitBoxSub').textContent = units.length + ' ' + ({es:'unidades disponibles',en:'available units',fr:'unités disponibles',it:'unità disponibili'}[lang]||'units');
  g('unitList').innerHTML = units.map((u,i)=>{
    const beds  = u['Recámaras']||'';
    const baths = u['Baños']||'';
    const area  = u['Area'] ? u['Area']+' '+(u['area_unit']||'m²') : '';
    const unit  = u['Unidad']||u['Unidad_nombre']||('Unidad '+(i+1));
    const meta  = [beds?beds+' rec':'', baths?baths+' ba':'', area].filter(Boolean).join(' · ');
    const price = formatPrice(u['Precio']);
    return `<div class="unit-item" onclick="selectUnit(${i})">
      <div class="unit-item-left">
        <span class="unit-item-name">${unit}</span>
        ${meta?`<span class="unit-item-meta">${meta}</span>`:''}
      </div>
      <span class="unit-item-price">${price?'MXN $'+price:''}</span>
      <span class="unit-item-arr">→</span>
    </div>`;
  }).join('');
  g('unitPanel').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeUnitPanel(){
  g('unitPanel').classList.remove('open');
  document.body.style.overflow='';
}

function selectUnit(idx){
  const u = _unitPanelUnits[idx];
  if(!u) return;
  closeUnitPanel();
  const id = u['home_listing_id'] || encodeURIComponent(u['Nombre']||'');
  window.location.href = `property.html?id=${id}&from=index&lang=${lang}`;
}

function bindCardClicks(){
  document.querySelectorAll('#prpG .prp-c').forEach((card,idx)=>{
    const p = renderedProps[idx];
    card.onclick = ()=>{
      if(!p) return;
      if(p._unitCount > 1){
        _unitPanelUnits = p._units;
        openUnitPanel(p._units);

        const id = p['home_listing_id'] || encodeURIComponent(p['Nombre']||'');
        window.location.href = `property.html?id=${id}&from=index&lang=${lang}`;
      }
    };
  });
  document.querySelectorAll('#prpG .prp-lk').forEach(a=>{ a.onclick = e=>e.stopPropagation(); });
}

function showFormOverlay(type, title, sub, btnTxt){

function submitContactForm(){
  const name     = (document.getElementById('cf-name')?.value||'').trim();
  const email    = (document.getElementById('cf-email')?.value||'').trim();
  const dialCode = (document.getElementById('cf-dialcode')?.value||'').trim();
  const phoneNum = (document.getElementById('cf-phone')?.value||'').trim();
  const phone    = [dialCode, phoneNum].filter(Boolean).join('').replace(/\D/g,'');
  const interest = (document.getElementById('cf-interest')?.value||'').trim();
  const message  = (document.getElementById('cf-message')?.value||'').trim();
  const btn      = document.getElementById('cf-submit');

  // Validation
  if(!name || !email || !email.includes('@')){
    const errMsg = {fr:'Veuillez remplir nom et e-mail.',en:'Please fill in name and email.',es:'Por favor completa nombre y correo.'}[lang];
    showFormOverlay('error',
      {fr:'Informations manquantes',en:'Missing information',es:'Faltan datos'}[lang],
      errMsg,
      {fr:'RÉESSAYER',en:'TRY AGAIN',es:'REINTENTAR'}[lang]
    );
    return;
  }

  // Loading
  const loadTxt = {fr:'ENVOI EN COURS…',en:'SENDING…',es:'ENVIANDO…'}[lang];
  btn.disabled = true;
  btn.textContent = loadTxt;
  btn.style.background = 'var(--gold-dk)';

  fetch(WEBHOOK, {
    method: 'POST',
    mode: 'cors',
    headers: {
      'Content-Type': 'application/json',
      'X-Source-Token': 'LRS-2025-xK9mP2qR7nJ4wT8v'
    },
    body: JSON.stringify({
      uid: crypto.randomUUID(),
      name, email, phone, interest, message,
      source: 'luxuryrealestatesignature.com',
      lang,
      timestamp: new Date().toLocaleString('sv-SE',{timeZone:'America/Cancun'}).replace(' ','T')
    })
  })
  .then(r => {
    if(!r.ok) throw new Error('HTTP '+r.status);
    // Reset button
    btn.disabled = false;
    btn.textContent = L[lang].fS;
    btn.style.background = 'var(--gold)';
    // Clear form
    ['cf-name','cf-email','cf-dialcode','cf-phone','cf-message'].forEach(id=>{
      const el = document.getElementById(id); if(el) el.value='';
    });
    const sel = document.getElementById('cf-interest');
    if(sel) sel.selectedIndex=0;
    if(typeof gtag!=='undefined') gtag('event','generate_lead',{method:'contact_form'});
    // Success overlay
    showFormOverlay('success',
      {fr:'Message envoyé',en:'Message sent',es:'Mensaje enviado'}[lang],
      {fr:'Merci pour votre intérêt. Notre équipe vous contactera dans les plus brefs délais.',
       en:'Thank you for your interest. Our team will be in touch with you shortly.',
       es:'Gracias por su interés. Nuestro equipo se pondrá en contacto con usted en breve.'}[lang],
      {fr:'FERMER',en:'CLOSE',es:'CERRAR'}[lang]
    );
  })
  .catch(err=>{
    console.error('Form submit error:', err.message || err);
    btn.disabled = false;
    btn.textContent = L[lang].fS;
    btn.style.background = 'var(--gold)';
    // Fallback: pre-fill mailto with form data
    const subj = encodeURIComponent('Contacto LRS — '+name);
    const body = encodeURIComponent('Nombre: '+name+'\nEmail: '+email+'\nTeléfono: '+phone+'\nInterés: '+interest+'\n\n'+message);
    const mailto = 'mailto:info@luxuryrealestatesignature.com?subject='+subj+'&body='+body;
    showFormOverlay('error',
      {fr:"Erreur d'envoi",en:'Something went wrong',es:'Error al enviar'}[lang],
      {fr:'Cliquez ci-dessous pour nous écrire directement par e-mail.',
       en:'Click below to reach us directly by email.',
       es:'Haga clic abajo para contactarnos directamente por correo.'}[lang],
      {fr:'ENVOYER PAR EMAIL',en:'SEND BY EMAIL',es:'ENVIAR POR EMAIL'}[lang]
    );
    setTimeout(()=>{
      const foBtn = document.getElementById('foBtn');
      if(foBtn) foBtn.onclick = ()=>{ window.location.href = mailto; closeFormOverlay(); };
    }, 50);
  });
}

// ── FLOATING LOGO (después de render para que DOM esté listo) ──
window.addEventListener('load', function(){
  const fLogo = document.getElementById('fLogo');
  if(!fLogo) return;

  function lerp(a,b,t){return a+(b-a)*t}
  function eio(t){return t<.5?2*t*t:-1+(4-2*t)*t}

  function updateLogo(){
    const sy  = window.scrollY;
    const vw  = window.innerWidth;
    const vh  = window.innerHeight;
    const p   = eio(Math.min(sy / (vh * 0.42), 1));

    const startW = Math.min(200, vw * 0.32);
    const startX = (vw - startW) / 2;
    const startY = vh * 0.05;

    const ref = document.getElementById('navLogoRef');
    const nr  = ref.getBoundingClientRect();
    const endW = 44;
    const endX = nr.left;
    const endY = nr.top;

    fLogo.style.left  = lerp(startX, endX, p) + 'px';
    fLogo.style.top   = lerp(startY, endY, p) + 'px';
    fLogo.style.width = lerp(startW, endW, p) + 'px';
  }

  window.addEventListener('scroll', updateLogo, {passive:true});
  window.addEventListener('resize', updateLogo);
  updateLogo();
});
</script>
