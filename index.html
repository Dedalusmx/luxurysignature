<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#080806;color:#F0EBE1;font-family:'Raleway',sans-serif;font-weight:300;overflow-x:hidden;-webkit-font-smoothing:antialiased;opacity:0;animation:bodyIn .6s .1s forwards}
img{max-width:100%;display:block}

:root{
  --gold:#C4A35A;
  --gold-lt:#E8D5A3;
  --gold-dk:#7A6535;
  --bg:#080806;
  --bg2:#0F0E0C;
  --bg3:#151310;
  --text:#F0EBE1;
  --dim:#8A8478;
  --border:rgba(196,163,90,0.12)
}

/* ── NAV ── */
#nav{position:fixed;top:0;left:0;right:0;z-index:100;height:80px;padding:0 6%;display:flex;align-items:center;transition:background .4s,border-color .4s;border-bottom:1px solid transparent}
#nav.scrolled{background:rgba(8,8,6,.95);backdrop-filter:blur(16px);border-color:var(--border)}
.nav-inner{width:100%;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px}
.nav-logo img{height:42px;object-fit:contain;filter:brightness(1.15)}
.nav-links{display:flex;list-style:none;gap:40px;justify-content:center}
.nav-links a{text-decoration:none;font-size:9.5px;font-weight:300;letter-spacing:3.5px;text-transform:uppercase;color:rgba(240,235,225,.7);position:relative;padding-bottom:4px;transition:color .25s}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--gold);transition:width .35s ease}
.nav-links a:hover{color:var(--gold-lt)}
.nav-links a:hover::after{width:100%}
.lang-sw{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.lang-btn{background:none;border:none;font-family:'Raleway',sans-serif;font-size:10px;font-weight:300;letter-spacing:2px;color:var(--dim);cursor:pointer;padding:4px 3px;transition:color .2s}
.lang-btn.active,.lang-btn:hover{color:var(--gold)}
.lang-sep{color:var(--dim);opacity:.3;font-size:8px;user-select:none}

/* ── HERO ── */
#hero{position:relative;height:100vh;min-height:680px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.h-bg{position:absolute;inset:0;background:url('https://res.cloudinary.com/dphbptped/image/upload/w_1920,q_auto,f_auto/v1779853245/Hero-luxury_xjrqqm.jpg') center/cover no-repeat;transform:scale(1.08);transition:transform 11s ease}
.h-bg.ready{transform:scale(1)}
.h-ov{position:absolute;inset:0;background:linear-gradient(155deg,rgba(8,8,6,.2) 0%,rgba(8,8,6,.52) 45%,rgba(8,8,6,.9) 100%)}
.h-cnt{position:relative;z-index:2;text-align:center;padding:0 24px;max-width:900px;margin-top:14vh}
#fLogo{position:fixed;z-index:101;cursor:pointer;pointer-events:auto;height:auto;transform-origin:top left}
.h-orn{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:36px;opacity:0;animation:up .9s .25s forwards}
.h-orn::before,.h-orn::after{content:'';width:52px;height:1px;background:var(--gold)}
.h-orn-txt{font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);font-weight:400}
.h-title{font-family:'Cormorant Garamond',serif;font-size:clamp(50px,8.5vw,105px);font-weight:300;font-style:normal;line-height:1.02;color:var(--text);letter-spacing:-.02em;opacity:0;animation:up .9s .42s forwards}
.h-title em{font-style:italic;color:var(--gold-lt)}
.h-loc{font-size:10px;font-weight:300;letter-spacing:5px;text-transform:uppercase;color:rgba(232,213,163,.65);margin:26px 0 48px;opacity:0;animation:up .9s .6s forwards}
.h-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;opacity:0;animation:up .9s .78s forwards}
.btn-g{display:inline-block;padding:16px 38px;background:var(--gold);color:var(--bg);text-decoration:none;font-size:9px;font-weight:500;letter-spacing:3.5px;text-transform:uppercase;transition:background .25s,transform .2s;white-space:nowrap}
.btn-g:hover{background:var(--gold-lt);transform:translateY(-2px)}
.btn-o{display:inline-block;padding:15px 38px;border:1px solid rgba(196,163,90,.42);color:rgba(240,235,225,.82);text-decoration:none;font-size:9px;font-weight:300;letter-spacing:3.5px;text-transform:uppercase;transition:border-color .25s,color .25s,transform .2s;white-space:nowrap}
.btn-o:hover{border-color:var(--gold);color:var(--gold-lt);transform:translateY(-2px)}
.h-sc{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:up .9s 1.1s forwards}
.sc-ln{width:1px;height:48px;background:linear-gradient(to bottom,var(--gold),transparent);animation:pulse 2.4s ease-in-out infinite}
.sc-t{font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--dim);margin-top:4px}

/* ── MANIFESTO ── */
#manifesto{padding:120px 6%;background:var(--bg2);text-align:center}
.gline{display:flex;align-items:center;justify-content:center;gap:14px;margin:36px auto}
.gline::before{content:'';flex:1;max-width:90px;height:1px;background:linear-gradient(to right,transparent,var(--gold))}
.gline::after{content:'';flex:1;max-width:90px;height:1px;background:linear-gradient(to left,transparent,var(--gold))}
.gdot{width:5px;height:5px;background:var(--gold);transform:rotate(45deg);flex-shrink:0}
.mf-ti{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,4.5vw,56px);font-weight:300;font-style:italic;color:var(--text);margin-bottom:28px;line-height:1.2}
.mf-tx{max-width:720px;margin:0 auto;font-size:15px;line-height:2;color:rgba(240,235,225,.6);font-weight:300;letter-spacing:.02em}

/* ── SECTIONS COMMONS ── */
.sec{padding:104px 0}
.s-in{max-width:1300px;margin:0 auto;padding:0 6%}
.s-hd{text-align:center;margin-bottom:72px}
.s-ey{display:block;font-size:9px;font-weight:300;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.s-ti{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,2.8vw,32px);font-weight:300;letter-spacing:5px;text-transform:uppercase;color:var(--text)}
.s-div{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:20px}
.s-div::before,.s-div::after{content:'';width:28px;height:1px;background:var(--gold);opacity:.38}

/* ── SERVICES ── */
#services{background:var(--bg)}
.srv-g{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(196,163,90,.06)}
.srv-c{padding:52px 38px;background:var(--bg2);transition:background .35s;position:relative;overflow:hidden}
.srv-c::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--gold);transition:width .55s}
.srv-c:hover{background:#131209}
.srv-c:hover::after{width:100%}
.srv-c:nth-child(1){transition-delay:0s}.srv-c:nth-child(2){transition-delay:.07s}.srv-c:nth-child(3){transition-delay:.14s}
.srv-c:nth-child(4){transition-delay:.21s}.srv-c:nth-child(5){transition-delay:.28s}.srv-c:nth-child(6){transition-delay:.35s}
.srv-ic{width:38px;height:38px;color:var(--gold);margin-bottom:28px;opacity:.88}
.srv-ti{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;font-style:italic;color:var(--text);margin-bottom:14px}
.srv-de{font-size:12.5px;line-height:1.85;color:var(--dim);font-weight:300}

/* ── PROPERTIES ── */
#properties{background:var(--bg3)}
.prp-g{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.prp-c{background:var(--bg2);overflow:hidden;cursor:pointer;transition:transform .3s}
.prp-c:hover{transform:translateY(-5px)}
.prp-c:nth-child(1){transition-delay:0s}.prp-c:nth-child(2){transition-delay:.08s}.prp-c:nth-child(3){transition-delay:.16s}
.prp-img{position:relative;height:400px;overflow:hidden}
.prp-img img{width:100%;height:100%;object-fit:cover;transition:transform .75s}
.prp-c:hover .prp-img img{transform:scale(1.07)}
.prp-ov{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(8,8,6,.82) 100%)}
.prp-badges{position:absolute;top:16px;right:16px;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.prp-badge{background:var(--gold);color:var(--bg);font-size:8px;font-weight:500;letter-spacing:3px;padding:5px 12px;text-transform:uppercase}
.prp-body{padding:26px 28px 32px}
.prp-nm{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;font-style:italic;color:var(--text);margin-bottom:6px}
.prp-lc{font-size:9px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.prp-ds{font-size:12px;line-height:1.82;color:var(--dim);margin-bottom:18px}
.prp-pr{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;color:var(--gold-lt);margin-bottom:20px}
.prp-details{display:flex;gap:20px;margin-bottom:14px;flex-wrap:wrap}
.prp-detail{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.prp-sold{position:absolute;top:20px;left:20px;background:rgba(8,8,6,.75);border:1px solid rgba(196,163,90,.5);color:var(--gold);font-size:8px;letter-spacing:3px;padding:5px 12px;text-transform:uppercase}
.prp-loading{text-align:center;padding:80px 20px;color:var(--dim);font-size:10px;letter-spacing:4px;text-transform:uppercase;grid-column:1/-1;animation:pulse 1.8s ease-in-out infinite}
.filter-bar{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:48px;padding:28px 32px;background:var(--bg2);border:1px solid var(--border)}
.filter-group{display:flex;flex-direction:column;gap:10px;flex:1;min-width:160px}
.filter-lbl{font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--gold)}
.filter-sel{background:transparent;border:none;border-bottom:1px solid rgba(196,163,90,.22);padding:8px 0;color:var(--text);font-family:'Raleway',sans-serif;font-size:13px;font-weight:300;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer;transition:border-color .3s;width:100%}
.filter-sel:focus{border-color:var(--gold)}
.filter-sel option{background:var(--bg2);color:var(--text)}
.prp-more-wrap{text-align:center;margin-top:52px}
.prp-count{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:20px}
.btn-more{padding:14px 52px;border:1px solid rgba(196,163,90,.35);color:rgba(240,235,225,.75);font-family:'Raleway',sans-serif;font-size:9px;font-weight:300;letter-spacing:4px;text-transform:uppercase;cursor:pointer;background:transparent;transition:border-color .3s,color .3s}
.btn-more:hover{border-color:var(--gold);color:var(--gold-lt)}
.prp-lk{font-size:9px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(--gold);text-decoration:none;border-bottom:1px solid rgba(196,163,90,.3);padding-bottom:2px;transition:color .2s,border-color .2s;display:inline-block}
.prp-lk:hover{color:var(--gold-lt);border-color:var(--gold-lt)}

/* ── INVEST ── */
#invest{background:var(--bg);text-align:center}
.st-g{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(196,163,90,.06);max-width:1040px;margin:0 auto 72px}
.st-c{padding:52px 24px;background:var(--bg2)}
.st-c:nth-child(1){transition-delay:0s}.st-c:nth-child(2){transition-delay:.08s}.st-c:nth-child(3){transition-delay:.16s}.st-c:nth-child(4){transition-delay:.24s}
.st-n{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5vw,64px);font-weight:300;color:var(--gold);line-height:1;margin-bottom:12px}
.st-l{font-size:9.5px;font-weight:300;letter-spacing:2px;text-transform:uppercase;color:var(--dim);line-height:1.75;white-space:pre-line}
.inv-tx{max-width:660px;margin:0 auto;font-size:14px;line-height:2;color:rgba(240,235,225,.58);font-weight:300}

/* ── TESTIMONIALS ── */
#testimonials{background:var(--bg2)}
.tst-g{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(196,163,90,.05)}
.tst-c{padding:52px 38px;background:var(--bg);position:relative;overflow:hidden}
.tst-c::before{content:'\201C';position:absolute;top:18px;left:26px;font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--gold);opacity:.1;line-height:1;font-style:italic;pointer-events:none}
.tst-c:nth-child(1){transition-delay:0s}.tst-c:nth-child(2){transition-delay:.1s}.tst-c:nth-child(3){transition-delay:.2s}
.tst-tx{font-family:'Cormorant Garamond',serif;font-size:16.5px;font-style:italic;font-weight:300;line-height:1.88;color:rgba(240,235,225,.74);margin-bottom:30px}
.tst-au{font-size:9.5px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:12px}
.tst-au::before{content:'';width:22px;height:1px;background:var(--gold);opacity:.5}

/* ── CONTACT ── */
#contact{background:var(--bg)}
.cnt-g{display:grid;grid-template-columns:1fr 1.35fr;gap:80px;align-items:start}
.cnt-tagline{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,2.8vw,34px);font-weight:300;font-style:italic;color:var(--text);margin-bottom:48px;line-height:1.45}
.cnt-lbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.cnt-val{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text);margin-bottom:32px;line-height:1.7}
.cnt-val a{text-decoration:none;color:var(--text);transition:color .2s}
.cnt-val a:hover{color:var(--gold-lt)}
.frm-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.frm-r{margin-bottom:24px}
.frm-r label{display:block;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.frm-r input,.frm-r textarea,.frm-r select{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(196,163,90,.2);padding:10px 0;color:var(--text);font-family:'Raleway',sans-serif;font-size:14px;font-weight:300;outline:none;transition:border-color .3s;appearance:none;-webkit-appearance:none}
.frm-r input::placeholder,.frm-r textarea::placeholder{color:rgba(138,132,120,.55);font-weight:300;font-size:13px}
.frm-r input:focus,.frm-r textarea:focus,.frm-r select:focus{border-color:var(--gold)}

function formatPrice(val){
  if(!val) return '';
  const n = parseFloat(String(val).replace(/[^0-9.]/g,''));
  if(isNaN(n)) return val;
  return '$' + n.toLocaleString('en-US') + ' MXN';
}

// ── Render tarjetas (recibe slice ya filtrado/paginado) ──

function imgUrl(url, w, h){
  if(!url) return '';
  if(url.includes('cloudinary')){
    const t = 'w_'+w+',q_auto,f_auto,c_fill'+(h?',h_'+h:'');
    // avoid double-transforming
    if(url.includes('/upload/'+t)) return url;
    return url.replace('/upload/', '/upload/'+t+'/');
  }
  return url;
}



function parseListingType(val){
  const v = (val||'').toUpperCase().trim();
  const map = {
    fr:{FOR_SALE:'À Vendre',FOR_SALE_BY_AGENT:'À Vendre',FOR_RENT:'À Louer',FOR_RENT_BY_AGENT:'À Louer',SOLD:'Vendu'},
    en:{FOR_SALE:'For Sale',FOR_SALE_BY_AGENT:'For Sale',FOR_RENT:'For Rent',FOR_RENT_BY_AGENT:'For Rent',SOLD:'Sold'},
    es:{FOR_SALE:'Venta',FOR_SALE_BY_AGENT:'Venta',FOR_RENT:'Renta',FOR_RENT_BY_AGENT:'Renta',SOLD:'Vendido'}
  };
  return (map[lang]&&map[lang][v]) || v.replace(/_/g,' ');
}

function statLabels(){
  return {
    rec: {fr:'Ch.',en:'Beds',es:'Rec.'}[lang],
    ban: {fr:'SDB',en:'Baths',es:'Baños'}[lang]
  };
}

function formatArea(area, unit){
  if(!area) return '';
  const m2 = parseFloat(area);
  if(isNaN(m2)) return area + ' ' + (unit||'m²');
  const sqft = Math.round(m2 * 10.764);
  return m2 + ' m² · ' + sqft.toLocaleString('en-US') + ' sq ft';
}

function getDesc(p){
  if(lang==='fr' && p['description FR'] && p['description FR'].trim()) return p['description FR'];
  if(lang==='en' && p['description EN'] && p['description EN'].trim()) return p['description EN'];
  return p['description']||'';
}

// ── Filtrado ──
// Parse DD/MM/YYYY HH:MM:SS → comparable number
function parseTimestamp(ts){
  if(!ts) return 0;
  const s = String(ts).trim();
  // DD/MM/YYYY HH:MM:SS
  const m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2}):(\d{2})$/);
  if(m) return new Date(+m[3],+m[2]-1,+m[1],+m[4],+m[5],+m[6]).getTime();
  // fallback: try native parse
  const d = new Date(s);
  return isNaN(d) ? 0 : d.getTime();
}

function getFiltered(){
  return allFetched
    .filter(p=>{
      const city    = (p['Ciudad']||'').trim().toLowerCase();
      const type    = (p['Tipo propiedad']||'').trim().toLowerCase();
      const listing = (p['listing_type']||'').trim().toLowerCase();
      return (
        (!filterState.city    || city    === filterState.city) &&
        (!filterState.type    || type    === filterState.type) &&
        (!filterState.listing || listing === filterState.listing)
      );
    })
    // Sort by timestamp descending — newest first
    .sort((a,b) => parseTimestamp(b['timestamp']||b['Timestamp']||b['TIMESTAMP']) -
                   parseTimestamp(a['timestamp']||a['Timestamp']||a['TIMESTAMP']));
}

// ── Ver más ──
function loadMore(){
  visibleCount += 6;
  renderFiltered();
  // scroll suave al primer card nuevo
  const cards = document.querySelectorAll('#prpG .prp-c');
  if(cards[visibleCount-6]) cards[visibleCount-6].scrollIntoView({behavior:'smooth',block:'center'});
}

// ── Render filtrado + paginado ──
function renderFiltered(){
  const t = L[lang];
  const filtered  = getFiltered();
  const grouped   = groupByName(filtered);
  const visible   = grouped.slice(0, visibleCount);
  renderPropsFromData(visible);

  const remaining = grouped.length - visibleCount;
  const moreWrap  = g('prpMore');
  if(remaining > 0){
    moreWrap.innerHTML = `
      <div class="prp-more-wrap">
        <p class="prp-count">${visible.length} DE ${filtered.length} PROPIEDADES</p>
        <button class="btn-more" onclick="loadMore()">VER ${Math.min(remaining,5)} MÁS</button>
      </div>`;
  } else {
    moreWrap.innerHTML = filtered.length > 0
      ? `<div class="prp-more-wrap"><p class="prp-count">${grouped.length} ${L[lang].prpLbl}</p></div>`
      : '';
  }
}

// ── Construir filtros dinámicos del sheet ──
function buildFilters(){
  const t = L[lang];
  const allLabel = {fr:'Tous',en:'All',es:'Todos'}[lang];
  const cityLbl  = {fr:'Ville',en:'City',es:'Ciudad'}[lang];
  const tipoLbl  = {fr:'Type de bien',en:'Property Type',es:'Tipo de Propiedad'}[lang];
  const ofertaLbl= {fr:'Offre',en:'Offer',es:'Oferta'}[lang];
  const uniq = col => [...new Set(allFetched.map(p=>(p[col]||'').trim()).filter(Boolean))].sort();

  const cities   = uniq('Ciudad');
  const types    = uniq('Tipo propiedad');
  const listings = uniq('listing_type');

  const sel = (id, opts, val, parse) =>
    `<select class="filter-sel" id="${id}">
      <option value="">${allLabel}</option>
      ${opts.map(o=>`<option value="${o.toLowerCase()}"${val===o.toLowerCase()?'selected':''}>${parse?parseListingType(o):o}</option>`).join('')}
    </select>`;

  g('prpFilters').innerHTML = `
    <div class="filter-bar">
      <div class="filter-group">
        <span class="filter-lbl">${cityLbl}</span>
        ${sel('fCity', cities, filterState.city, false)}
      </div>
      <div class="filter-group">
        <span class="filter-lbl">${tipoLbl}</span>
        ${sel('fType', types, filterState.type, false)}
      </div>
      <div class="filter-group">
        <span class="filter-lbl">${ofertaLbl}</span>
        ${sel('fListing', listings, filterState.listing, true)}
      </div>
    </div>`;

  ['fCity','fType','fListing'].forEach(id=>{
    document.getElementById(id).addEventListener('change', e=>{
      const key = {fCity:'city',fType:'type',fListing:'listing'}[id];
      filterState[key] = e.target.value;
      visibleCount = 6;
      renderFiltered();
    });
  });
}

// ── Fetch principal ──
function loadProps(){
  if(allFetched.length){ buildFilters(); renderFiltered(); return; }
  g('prpG').innerHTML = '<div class="prp-loading">'+L[lang].prpLoading+'</div>';
  Papa.parse(SHEET_CSV,{
    download: true,
    header:   true,
    skipEmptyLines: true,
    complete(res){
      allFetched = res.data.filter(r => IMG_COLS.some(c=>r[c]&&r[c].trim()));
      buildFilters();
      try {
        renderFiltered();
      } catch(e) {
        console.error('renderFiltered error:', e.message, e.stack);
        // Fallback — render without grouping
        renderedProps = allFetched.slice(0, visibleCount);
        renderPropsFromData(renderedProps);
      }
      // Open property from URL hash if present
      const hash = decodeURIComponent(window.location.hash);
      if(hash.startsWith('#prop-')){
        const id = hash.slice(6);
        const match = allFetched.find(r=>
          (r['home_listing_id']||r['Nombre']||'') === id
        );
        if(match) openPropertyDirect(match);
      }
    },
    error(){
      g('prpG').innerHTML = '<div class="prp-loading" style="color:rgba(196,163,90,.4)">ERROR AL CARGAR</div>';
    }
  });
}


// ── GROUP BY NAME ──
function groupByName(data){
  const parseNum = v => parseFloat(String(v||0).replace(/[^0-9.]/g,''))||0;
  const groups = {};
  data.forEach(p=>{
    const name = (p['Nombre']||'').trim();
    if(!groups[name]) groups[name] = [];
    groups[name].push(p);
  });
  return Object.values(groups).map(units=>{
    // Representative = first item (already sorted by timestamp desc from getFiltered)
    const rep = units[0];
    // Within group: sort units by Unidad alphanumerically
    const sortedUnits = [...units].sort((a,b)=>{
      const ua = String(a['Unidad']||'').trim();
      const ub = String(b['Unidad']||'').trim();
      // Numeric if both are numbers, else alphabetical
      const na = parseNum(ua), nb = parseNum(ub);
      if(na && nb) return na - nb;
      return ua.localeCompare(ub, 'es', {numeric:true});
    });
    return Object.assign({}, rep, {_units: sortedUnits, _unitCount: units.length});
  });
}

  _unitPanelUnits = units;

  const selLbl = {fr:'Sélectionner une unité',en:'Select a unit',es:'Selecciona una unidad'}[lang];

  g('unitPanelName').textContent = rep['Nombre']||'';
  g('unitPanelLoc').textContent  = [rep['Colonia'],rep['Ciudad']].filter(Boolean).join(', ');
  g('unitPanelLbl').textContent  = selLbl;

  g('unitList').innerHTML = units.map((p,i)=>{
    const unit  = p['Unidad']||'';
    const beds  = p['Rec\u00e1maras']||'';
    const baths = p['Ba\u00f1os']||'';
    const area  = p['Area']?formatArea(p['Area'],p['area_unit']):'';
    const stats = [
      beds  ? beds+' '+statLabels().rec :'',
      baths ? baths+' '+statLabels().ban:'',
      area  ? area :''
    ].filter(Boolean).join(' · ');

    return `<div class="unit-item" data-unit-idx="${i}">
      <div class="unit-item-left">
        <p class="unit-item-name">${unit ? 'Unidad '+unit : (p['Nombre']||'')}</p>
        ${stats?`<p class="unit-item-stats">${stats}</p>`:''}
      </div>
      <p class="unit-item-price">${formatPrice(p['Precio'])}</p>
    </div>`;
  }).join('');

  // Bind clicks after render
  g('unitList').querySelectorAll('.unit-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      const idx = parseInt(el.dataset.unitIdx)||0;
      closeUnitPanel();
      openPropertyDirect(_unitPanelUnits[idx]);
    });
  });

  g('unitPanel').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeUnitPanel(){
  g('unitPanel').classList.remove('open');
  document.body.style.overflow='';
}

function observe(){
  const ob = new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('vis'); });
  },{threshold:0.1});
  document.querySelectorAll('.rev').forEach(el=>ob.observe(el));
}

function splitDesc(text, n){
  if(!text||!text.trim()) return Array(n).fill('');
  let chunks = text.split(/\n\n+/).map(s=>s.trim()).filter(Boolean);
  if(chunks.length < 2){
    const sents = text.match(/[^.!?]+[.!?]+\s*/g) || [text];
    const per = Math.ceil(sents.length / n);
    chunks = [];
    for(let i=0;i<sents.length;i+=per) chunks.push(sents.slice(i,i+per).join('').trim());
  }
  while(chunks.length < n) chunks.push(chunks[chunks.length-1]||'');
  return chunks.slice(0,n);
}

let _lbImages = [], _lbIndex = 0;

function openLightbox(src, images, startIndex){
  _lbImages = images || [src];
  _lbIndex  = startIndex !== undefined ? startIndex : Math.max(0, _lbImages.indexOf(src));
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function updateLightbox(){
  document.getElementById('lbImg').src = _lbImages[_lbIndex];
  document.getElementById('lbCounter').textContent = (_lbIndex+1) + ' / ' + _lbImages.length;
  const show = _lbImages.length > 1 ? '1' : '0';
  document.getElementById('lbPrev').style.opacity = show;
  document.getElementById('lbNext').style.opacity = show;
}
function lbNavigate(dir){
  _lbIndex = (_lbIndex + dir + _lbImages.length) % _lbImages.length;
  updateLightbox();
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  if(!document.getElementById('detailView').classList.contains('open'))
    document.body.style.overflow = '';
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLightbox(); });

function initDetailParallax(){
  const dv     = document.getElementById('detailView');
  const panels = dv.querySelectorAll('.d-panel');
  const txts   = dv.querySelectorAll('[data-txt]');

  const revObs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){ if(e.isIntersecting) e.target.classList.add('visible'); });
  },{root:dv, threshold:0.25});
  txts.forEach(function(t){ revObs.observe(t); });

  function applyParallax(){
    const dvRect = dv.getBoundingClientRect();
    panels.forEach(function(panel){
      const wrap = panel.querySelector('[data-parallax]');
      if(!wrap) return;
      const r = panel.getBoundingClientRect();
      const relCenter = (r.top + r.height/2) - dvRect.top - dvRect.height/2;
      wrap.style.transform = 'translateY('+(relCenter*0.18)+'px)';
    });
  }
  dv.addEventListener('scroll', applyParallax, {passive:true});
  applyParallax();

  // Click panel image area to open lightbox with full gallery
  const _allGallImgs = [...dv.querySelectorAll('.d-panel-img-wrap img')].map(i=>i.src);
  dv.querySelectorAll('.d-panel').forEach(panel=>{
    const img = panel.querySelector('.d-panel-img-wrap img');
    if(!img) return;
    const txt = panel.querySelector('.d-panel-txt');
    if(txt) txt.addEventListener('click', e=>e.stopPropagation());
    function openPanel(e){
      e.preventDefault();
      openLightbox(img.src, _allGallImgs, _allGallImgs.indexOf(img.src));
    }
    panel.addEventListener('click', openPanel);
  });

}



let _currentPropName = '';

function shareProperty(){
  if(typeof gtag!=='undefined') gtag('event','share',{method:navigator.share?'native':'clipboard',content_type:'property',item_id:_currentPropName});
  const url  = window.location.href;
  const name = _currentPropName;
  const toast = document.getElementById('shareToast');
  const copied = {fr:'LIEN COPIÉ',en:'LINK COPIED',es:'ENLACE COPIADO'}[lang];
  const shared = {fr:'PARTAGÉ',en:'SHARED',es:'COMPARTIDO'}[lang];

  function showToast(msg){
    toast.textContent = '✦  '+msg+'  ✦';
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'), 2800);
  }

  if(navigator.share){
    navigator.share({title:name, url})
      .then(()=>showToast(shared)).catch(()=>{});
    return;
  }
  if(navigator.clipboard){
    navigator.clipboard.writeText(url)
      .then(()=>showToast(copied))
      .catch(()=>fallbackCopy(url,showToast,copied));
  } else {
    fallbackCopy(url,showToast,copied);
  }
}

function fallbackCopy(url,showToast,msg){
  const el = document.createElement('input');
  el.value = url;
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);
  showToast(msg);
}

// ── FLOATING LOGO (después de render para que DOM esté listo) ──
window.addEventListener('load', function(){
  const fLogo = document.getElementById('fLogo');
  if(!fLogo) return;

  function lerp(a,b,t){return a+(b-a)*t}
  function eio(t){return t<.5?2*t*t:-1+(4-2*t)*t}

  function updateLogo(){
    const sy  = window.scrollY;
    const vw  = window.innerWidth;
    const vh  = window.innerHeight;
    const p   = eio(Math.min(sy / (vh * 0.42), 1));

    const startW = Math.min(200, vw * 0.32);
    const startX = (vw - startW) / 2;
    const startY = vh * 0.10;

    const ref = document.getElementById('navLogoRef');
    const nr  = ref.getBoundingClientRect();
    const endW = 44;
    const endX = nr.left;
    const endY = nr.top;

    fLogo.style.left  = lerp(startX, endX, p) + 'px';
    fLogo.style.top   = lerp(startY, endY, p) + 'px';
    fLogo.style.width = lerp(startW, endW, p) + 'px';
  }

  window.addEventListener('scroll', updateLogo, {passive:true});
  window.addEventListener('resize', updateLogo);
  updateLogo();
});
</script>
