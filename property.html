<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#080806;color:#F0EBE1;font-family:'Raleway',sans-serif;font-weight:300;overflow-x:hidden;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
:root{
  --gold:#C4A35A;--gold-lt:#E8D5A3;--gold-dk:#7A6535;
  --bg:#080806;--bg2:#0F0E0C;--bg3:#151310;
  --text:#F0EBE1;--dim:#8A8478;--border:rgba(196,163,90,0.12)
}

/* ── NAV ── */
#nav{position:fixed;top:0;left:0;right:0;z-index:200;height:60px;background:rgba(8,8,6,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 4%;gap:20px}
.nav-back{font-size:9px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--dim);text-decoration:none;display:flex;align-items:center;gap:8px;transition:color .2s;white-space:nowrap;flex-shrink:0}
.nav-back:hover{color:var(--gold)}
.nav-back svg{width:12px;height:12px}
.nav-logo{flex:1;display:flex;justify-content:center}
.nav-logo img{height:34px;object-fit:contain;filter:brightness(1.15)}
.nav-controls{display:flex;align-items:center;gap:10px;flex-shrink:0}
.lang-sw{display:flex;align-items:center;gap:5px}
.lang-btn{background:none;border:none;font-family:'Raleway',sans-serif;font-size:9px;font-weight:300;letter-spacing:2px;color:var(--dim);cursor:pointer;padding:3px;transition:color .2s}
.lang-btn.active,.lang-btn:hover{color:var(--gold)}
.lang-sep{color:var(--dim);opacity:.3;font-size:7px}
.share-btn{background:none;border:1px solid var(--border);color:var(--dim);font-family:'Raleway',sans-serif;font-size:9px;font-weight:300;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
.share-btn:hover{border-color:var(--gold);color:var(--gold)}
.share-btn svg{width:12px;height:12px}

/* ── LOADING / ERROR ── */
#loadingState{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;z-index:100}
.load-logo img{height:56px;opacity:.7;animation:pulse 2s ease-in-out infinite}
.load-txt{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--dim);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
#errorState{display:none;position:fixed;inset:0;background:var(--bg);align-items:center;justify-content:center;flex-direction:column;gap:20px;text-align:center;padding:40px}
.err-ti{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;font-style:italic;color:var(--text);margin-bottom:8px}
.err-sub{font-size:11px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:32px}

/* ── HERO ── */
#propHero{position:relative;height:100vh;min-height:560px;display:flex;align-items:flex-end;padding-bottom:64px;overflow:hidden}
.h-bg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.06);transition:transform 10s ease}
.h-bg.ready{transform:scale(1)}
.h-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,8,6,.98) 0%,rgba(8,8,6,.55) 45%,rgba(8,8,6,.28) 75%,rgba(8,8,6,.15) 100%)}
.h-cnt{position:relative;z-index:2;padding:0 6%;width:100%;opacity:0;transform:translateY(20px);transition:opacity .6s .2s,transform .6s .2s}
.h-cnt.ready{opacity:1;transform:none}
.h-type{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:block}
.h-name{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,6vw,80px);font-weight:300;line-height:1.02;color:var(--text);margin-bottom:12px;text-shadow:0 2px 24px rgba(8,8,6,.5)}
.h-loc{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(240,235,225,.75);margin-bottom:18px}
.h-price{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--gold-lt);text-shadow:0 1px 12px rgba(8,8,6,.4)}

/* ── BODY ── */
#propBody{max-width:1200px;margin:0 auto;padding:72px 6% 0}
.d-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1px;background:var(--border);margin-bottom:56px}
.d-stat{padding:24px 20px;background:var(--bg2);opacity:0;transform:translateY(16px);transition:opacity .5s,transform .5s}
.d-stat.vis{opacity:1;transform:none}
.d-stat:nth-child(1){transition-delay:.05s}.d-stat:nth-child(2){transition-delay:.1s}.d-stat:nth-child(3){transition-delay:.15s}
.d-stat:nth-child(4){transition-delay:.2s}.d-stat:nth-child(5){transition-delay:.25s}.d-stat:nth-child(6){transition-delay:.3s}
.d-stat-v{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--text);margin-bottom:4px}
.d-stat-l{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--dim)}

/* ── NARRATIVE PANELS ── */
.d-panel{position:relative;height:80vh;min-height:480px;overflow:hidden;display:flex;align-items:center}
.d-panel-img-wrap{position:absolute;inset:-18% 0;z-index:0;will-change:transform;cursor:zoom-in}
.d-panel-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.d-panel-ov-l{position:absolute;inset:0;background:linear-gradient(90deg,rgba(8,8,6,.96) 0%,rgba(8,8,6,.72) 40%,rgba(8,8,6,.25) 70%,rgba(8,8,6,.08) 100%);z-index:1;pointer-events:none}
.d-panel-ov-r{position:absolute;inset:0;background:linear-gradient(270deg,rgba(8,8,6,.96) 0%,rgba(8,8,6,.72) 40%,rgba(8,8,6,.25) 70%,rgba(8,8,6,.08) 100%);z-index:1;pointer-events:none}
.d-panel-txt{position:relative;z-index:2;padding:0 8%;max-width:560px;opacity:0;transform:translateY(28px);transition:opacity .9s ease,transform .9s ease}
.d-panel-txt.right{margin-left:auto;text-align:right}
.d-panel-txt.vis{opacity:1;transform:none}
.d-panel-num{font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:300;color:var(--gold);opacity:.1;line-height:1;margin-bottom:-12px;display:block}
.d-panel-p{font-family:'Cormorant Garamond',serif;font-size:clamp(16px,2vw,22px);font-style:italic;font-weight:300;line-height:1.8;color:rgba(240,235,225,.95);text-shadow:0 1px 16px rgba(8,8,6,.6)}
.d-panel-div{width:28px;height:1px;background:var(--gold);margin:16px 0;opacity:.6}
.d-panel-txt.right .d-panel-div{margin-left:auto}

/* ── GALLERY ── */
.d-section{padding:72px 6%;max-width:1200px;margin:0 auto}
.d-section-ey{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:28px;display:block}
.d-gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.d-gallery-grid a{display:block;overflow:hidden;aspect-ratio:4/3;cursor:zoom-in}
.d-gallery-grid a:first-child{grid-column:1/3;grid-row:1/3;aspect-ratio:unset}
.d-gallery-grid img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.d-gallery-grid a:hover img{transform:scale(1.04)}

/* ── PROP MAP ── */
.d-map-container{height:420px;border:1px solid var(--border);overflow:hidden}

/* ── CTA ── */
.d-cta-panel{position:relative;min-height:55vh;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:72px}
.d-cta-bg-img{position:absolute;inset:-15% 0;z-index:0}
.d-cta-bg-img img{width:100%;height:100%;object-fit:cover;filter:brightness(.3) saturate(.6)}
.d-cta-content{position:relative;z-index:2;text-align:center;padding:56px 24px}
.d-cta-eyebrow{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:18px;display:block}
.d-cta-heading{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,3.5vw,46px);font-weight:300;font-style:italic;color:var(--text);margin-bottom:36px;line-height:1.25}
.d-cta-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.d-cta-email{margin-top:24px;font-size:11px;font-weight:300;letter-spacing:2px}
.d-cta-email a{color:rgba(240,235,225,.45);text-decoration:none;transition:color .2s}
.d-cta-email a:hover{color:var(--gold-lt)}
.d-cta-social{display:flex;gap:16px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.d-cta-social-link{color:rgba(240,235,225,.3);transition:color .25s,transform .2s;display:flex;align-items:center}
.d-cta-social-link:hover{color:var(--gold);transform:translateY(-2px)}
.d-cta-social-link svg{width:16px;height:16px}
.btn-g{display:inline-block;padding:14px 34px;background:var(--gold);color:var(--bg);text-decoration:none;font-size:9px;font-weight:500;letter-spacing:3px;text-transform:uppercase;transition:background .25s;cursor:pointer;border:none}
.btn-g:hover{background:var(--gold-lt)}
.btn-o{display:inline-block;padding:13px 34px;border:1px solid rgba(196,163,90,.42);color:rgba(240,235,225,.82);text-decoration:none;font-size:9px;font-weight:300;letter-spacing:3px;text-transform:uppercase;transition:border-color .25s,color .25s;cursor:pointer;background:none}
.btn-o:hover{border-color:var(--gold);color:var(--gold-lt)}

/* ── FOOTER ── */
#propFooter{padding:32px 6%;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-top:0}
.foot-copy{font-size:9px;letter-spacing:2px;color:var(--dim)}
.foot-links{display:flex;gap:24px}
.foot-links a{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color .2s}
.foot-links a:hover{color:var(--gold)}

/* ── LIGHTBOX ── */
#lightbox{position:fixed;inset:0;z-index:1500;background:rgba(8,8,6,.96);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;cursor:zoom-out;backdrop-filter:blur(6px)}
#lightbox.open{opacity:1;pointer-events:auto}
#lbImg{max-width:90vw;max-height:90vh;object-fit:contain;transform:scale(.96);transition:transform .35s}
#lightbox.open #lbImg{transform:scale(1)}
.lb-close{position:absolute;top:24px;right:24px;background:none;border:1px solid rgba(196,163,90,.35);color:var(--gold);font-size:14px;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── TOAST ── */
#shareToast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(16px);z-index:700;background:var(--bg2);border:1px solid var(--gold);color:var(--gold-lt);font-family:'Raleway',sans-serif;font-size:9px;font-weight:300;letter-spacing:3px;text-transform:uppercase;padding:12px 28px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;white-space:nowrap}
#shareToast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── WA FLOAT ── */
#waFloat{position:fixed;bottom:28px;right:28px;z-index:400;width:48px;height:48px;background:var(--bg2);border:1px solid rgba(196,163,90,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;opacity:0;pointer-events:none;transform:translateY(10px);transition:opacity .5s,transform .5s,border-color .25s}
#waFloat.visible{opacity:1;pointer-events:auto;transform:translateY(0)}
#waFloat:hover{border-color:var(--gold)}
#waFloat svg{width:22px;height:22px;fill:var(--gold)}

@media(max-width:768px){
  .d-gallery-grid{grid-template-columns:1fr 1fr}
  .d-gallery-grid a:first-child{grid-column:1/3;grid-row:auto}
  .d-map-container{height:280px}
  .d-panel{height:60vh;min-height:360px}
  #propBody{padding:48px 5% 0}
  .d-section{padding:48px 5%}
}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
</style>

}

function parsePrice(val){ return parseFloat(String(val||'').replace(/[^0-9.]/g,''))||0; }

function formatCurrency(mxnPrice){
  const n=parsePrice(mxnPrice);
  if(!n) return '';
  let amount,sym;
  if(currency==='USD'){amount=n*rates.USD;sym='USD';}
  else if(currency==='CAD'){amount=n*rates.CAD;sym='CAD';}
  else{amount=n;sym='MXN';}
  return sym+' $'+Math.round(amount).toLocaleString('en-US');
}

function parseLocation(locStr){
  if(!locStr) return null;
  const parts=locStr.split(',').map(s=>parseFloat(s.trim()));
  if(parts.length===2&&!isNaN(parts[0])&&!isNaN(parts[1])) return {lat:parts[0],lng:parts[1]};
  return null;
}

function getAllImgs(p){ return IMG_COLS.map(c=>p[c]).filter(u=>u&&u.trim()); }

function isLand(p){
  const t=(p['Tipo propiedad']||'').toLowerCase();
  return t.includes('terreno')||t.includes('land')||t.includes('lote');
}

function parseListingType(raw){
  const v=(raw||'').toLowerCase();
  if(v.includes('sale')) return {es:'En Venta',en:'For Sale',fr:'À Vendre'}[lang]||'For Sale';
  if(v.includes('rent')) return {es:'En Renta',en:'For Rent',fr:'À Louer'}[lang]||'For Rent';
  return raw;
}

function splitDesc(text,n){
  if(!text||!text.trim()) return Array(n).fill('');
  let chunks=text.split(/\n\n+/).map(s=>s.trim()).filter(Boolean);
  if(chunks.length<2){
    const sents=text.match(/[^.!?]+[.!?]+\s*/g)||[text];
    const per=Math.ceil(sents.length/n);
    chunks=[];
    for(let i=0;i<sents.length;i+=per) chunks.push(sents.slice(i,i+per).join('').trim());
  }
  while(chunks.length<n) chunks.push(chunks[chunks.length-1]||'');
  return chunks.slice(0,n);
}

function applyLang(){
  const t=L[lang];
  document.documentElement.lang=lang;
  g('navBackTxt').textContent=t.back;
  g('shareTxt').textContent=t.share;

  g('footHome').textContent=t.footHome;
  g('footCol').textContent=t.footCol;

  const ref=new URLSearchParams(window.location.search).get('from');
  g('navBack').href = ref==='index' ? 'index.html' : 'collection.html';

          <a href="https://www.facebook.com/share/1JVgqwCeRr/" target="_blank" class="d-cta-social-link"><svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>

  // Show all sections
  g('propHero').style.display='flex';
  g('propBody').style.display='block';
  g('dNarrative').style.display='block';

  const txtObs=new IntersectionObserver(es=>{

// ── LIGHTBOX ──
function openLightbox(src){
  g('lbImg').src=src;
  g('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLightbox(){
  g('lightbox').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeLightbox(); });

// ── SHARE ──
let _propName='';
function shareProperty(){
  const url=window.location.href;
  const toast=g('shareToast');
  const t=L[lang];
  function showToast(msg){ toast.textContent='✦  '+msg+'  ✦'; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),2800); }
  if(navigator.share){ navigator.share({title:_propName,url}).then(()=>showToast(t.toast.shared)).catch(()=>{}); return; }
  if(navigator.clipboard){ navigator.clipboard.writeText(url).then(()=>showToast(t.toast.copied)).catch(()=>fallback(url,showToast,t.toast.copied)); }
  else fallback(url,showToast,t.toast.copied);
}
function fallback(url,showToast,msg){ const el=document.createElement('input');el.value=url;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);showToast(msg); }

// ── LANG ──
document.querySelectorAll('.lang-btn').forEach(b=>{
  b.addEventListener('click',()=>{ lang=b.dataset.lang; applyLang(); });
});

// ── INIT ──
async function init(){
  // Read lang from URL
  const params=new URLSearchParams(window.location.search);
  const urlLang=params.get('lang');
  if(urlLang&&L[urlLang]) lang=urlLang;

  // Get property ID
  const propId=params.get('id');
  if(!propId){ showError(); return; }

  applyLang();

  // Exchange rates
  try{
    const r=await fetch('https://open.er-api.com/v6/latest/MXN');
    const d=await r.json();
    if(d.rates){rates.USD=d.rates.USD;rates.CAD=d.rates.CAD;}
  }catch(e){}

  // Fetch sheet
  Papa.parse(SHEET_CSV,{
    download:true,header:true,skipEmptyLines:true,
    complete(res){
      const all=res.data.filter(r=>IMG_COLS.some(c=>r[c]&&r[c].trim()));
      // Find by home_listing_id or Nombre
      const match=all.find(r=>(r['home_listing_id']||'')=== propId)||(all.find(r=>encodeURIComponent(r['Nombre']||'')===propId));
      if(!match){ showError(); return; }
      propData=match;
      _propName=match['Nombre']||'';
      renderProperty(match);
    },
    error(){ showError(); }
  });
}

init();
