<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#080806;color:#F0EBE1;font-family:'Raleway',sans-serif;font-weight:300;overflow-x:hidden;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
:root{
  --gold:#C4A35A;--gold-lt:#E8D5A3;--gold-dk:#7A6535;
  --bg:#080806;--bg2:#0F0E0C;--bg3:#151310;
  --text:#F0EBE1;--dim:#8A8478;--border:rgba(196,163,90,0.12)
}

/* ── NAV ── */
#nav{position:fixed;top:0;left:0;right:0;z-index:200;height:60px;background:rgba(8,8,6,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 4%;gap:20px}
.nav-back{font-size:9px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--dim);text-decoration:none;display:flex;align-items:center;gap:8px;transition:color .2s;white-space:nowrap;flex-shrink:0}
.nav-back:hover{color:var(--gold)}
.nav-back svg{width:12px;height:12px}
.nav-logo{flex:1;display:flex;justify-content:center;align-items:center;gap:10px;text-decoration:none}
.nav-logo img{height:28px;width:28px;object-fit:contain;filter:brightness(1.2) drop-shadow(0 0 6px rgba(196,163,90,.4));flex-shrink:0}
.nav-logo-txt{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;font-style:italic;color:var(--text);white-space:nowrap;letter-spacing:.02em}
@media(max-width:480px){
  .nav-logo-txt{font-size:13px;letter-spacing:.01em}
  .nav-back span{display:none}
  .nav-back{gap:0}
}
.nav-controls{display:flex;align-items:center;gap:10px;flex-shrink:0}

/* ── LANG DROPDOWN ── */
.lang-dd{position:relative;flex-shrink:0}
.lang-dd-btn{background:none;border:1px solid rgba(196,163,90,.22);font-family:'Raleway',sans-serif;font-size:9px;font-weight:300;letter-spacing:2px;color:var(--gold);cursor:pointer;padding:5px 10px;display:flex;align-items:center;gap:5px;transition:border-color .2s,color .2s;white-space:nowrap}
.lang-dd-btn:hover{border-color:rgba(196,163,90,.5)}
.lang-dd-btn svg{width:8px;height:8px;transition:transform .2s;flex-shrink:0}
.lang-dd.open .lang-dd-btn svg{transform:rotate(180deg)}
.lang-dd-menu{position:absolute;top:calc(100% + 6px);right:0;background:rgba(12,11,9,.97);backdrop-filter:blur(16px);border:1px solid var(--border);min-width:100%;display:none;flex-direction:column;z-index:300}
.lang-dd.open .lang-dd-menu{display:flex}
.lang-btn{background:none;border:none;font-family:'Raleway',sans-serif;font-size:9px;font-weight:300;letter-spacing:2px;color:var(--dim);cursor:pointer;padding:9px 14px;text-align:left;transition:color .2s,background .2s;white-space:nowrap}
.lang-btn.active,.lang-btn:hover{color:var(--gold);background:rgba(196,163,90,.06)}
.lang-sep{display:none}

/* ── LOADING / ERROR ── */
#loadingState{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;z-index:100}
.load-logo img{height:56px;opacity:.7;animation:pulse 2s ease-in-out infinite}
.load-txt{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--dim);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
#errorState{display:none;position:fixed;inset:0;background:var(--bg);align-items:center;justify-content:center;flex-direction:column;gap:20px;text-align:center;padding:40px}
.err-ti{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;font-style:italic;color:var(--text);margin-bottom:8px}
.err-sub{font-size:11px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:32px}

/* ── HERO ACTION BUTTONS (top-right) ── */
.h-actions{position:absolute;top:72px;right:5%;z-index:3;display:flex;flex-direction:column;gap:8px;align-items:stretch}
.h-share{background:rgba(8,8,6,.45);backdrop-filter:blur(8px);border:1px solid rgba(232,213,163,.35);color:rgba(232,213,163,.85);font-family:'Raleway',sans-serif;font-size:9px;font-weight:400;letter-spacing:3px;text-transform:uppercase;padding:10px 18px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:background .25s,border-color .25s,color .25s;opacity:0;animation:up .6s .5s forwards;width:100%;min-width:160px}
.h-share:hover{background:rgba(196,163,90,.15);border-color:var(--gold);color:var(--gold-lt)}
#propHero{position:relative;height:100vh;min-height:560px;display:flex;align-items:flex-end;padding-bottom:64px;overflow:hidden}
.h-bg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.06);transition:transform 10s ease}
.h-bg.ready{transform:scale(1)}
.h-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,8,6,.98) 0%,rgba(8,8,6,.55) 45%,rgba(8,8,6,.28) 75%,rgba(8,8,6,.15) 100%)}
.h-cnt{position:relative;z-index:2;padding:0 6%;width:100%;opacity:0;transform:translateY(20px);transition:opacity .6s .2s,transform .6s .2s}
.h-cnt.ready{opacity:1;transform:none}
.h-type{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:block}
.h-name{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,6vw,80px);font-weight:300;line-height:1.02;color:var(--text);margin-bottom:12px;text-shadow:0 2px 24px rgba(8,8,6,.5)}
.h-loc{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(240,235,225,.75);margin-bottom:18px}
.h-price{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--gold-lt);text-shadow:0 1px 12px rgba(8,8,6,.4)}

/* ── BODY ── */
#propBody{max-width:1200px;margin:0 auto;padding:72px 6% 0}
.d-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1px;background:var(--border);margin-bottom:56px}
.d-stat{padding:24px 20px;background:var(--bg2);opacity:0;transform:translateY(16px);transition:opacity .5s,transform .5s}
.d-stat.vis{opacity:1;transform:none}
.d-stat:nth-child(1){transition-delay:.05s}.d-stat:nth-child(2){transition-delay:.1s}.d-stat:nth-child(3){transition-delay:.15s}
.d-stat:nth-child(4){transition-delay:.2s}.d-stat:nth-child(5){transition-delay:.25s}.d-stat:nth-child(6){transition-delay:.3s}
.d-stat-v{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--text);margin-bottom:4px}
.d-stat-l{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--dim)}

/* ── AMENITIES ── */
.d-amenities{max-width:1200px;margin:0 auto;padding:0 6% 72px}
.d-amenities-ey{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:28px;display:block}
.d-amenities-grid{display:flex;flex-wrap:wrap;gap:10px}
.d-amenity{font-size:11px;font-weight:300;letter-spacing:1.5px;color:rgba(240,235,225,.65);padding:9px 20px;border:1px solid rgba(196,163,90,.15);transition:border-color .25s,color .25s}
.d-amenity:hover{border-color:rgba(196,163,90,.4);color:rgba(240,235,225,.9)}
.d-panel{position:relative;height:80vh;min-height:480px;overflow:hidden;display:flex;align-items:center}
.d-panel-img-wrap{position:absolute;inset:-18% 0;z-index:0;will-change:transform;cursor:zoom-in}
.d-panel-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.d-panel-ov-l{position:absolute;inset:0;background:linear-gradient(90deg,rgba(8,8,6,.96) 0%,rgba(8,8,6,.72) 40%,rgba(8,8,6,.25) 70%,rgba(8,8,6,.08) 100%);z-index:1;pointer-events:none}
.d-panel-ov-r{position:absolute;inset:0;background:linear-gradient(270deg,rgba(8,8,6,.96) 0%,rgba(8,8,6,.72) 40%,rgba(8,8,6,.25) 70%,rgba(8,8,6,.08) 100%);z-index:1;pointer-events:none}
.d-panel-txt{position:relative;z-index:2;padding:0 8%;max-width:560px;opacity:0;transform:translateY(28px);transition:opacity .9s ease,transform .9s ease}
.d-panel-txt.right{margin-left:auto;text-align:right}
.d-panel-txt.vis{opacity:1;transform:none}
.d-panel-num{font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:300;color:var(--gold);opacity:.1;line-height:1;margin-bottom:-12px;display:block}
.d-panel-p{font-family:'Cormorant Garamond',serif;font-size:clamp(16px,2vw,22px);font-style:italic;font-weight:300;line-height:1.8;color:rgba(240,235,225,.95);text-shadow:0 1px 16px rgba(8,8,6,.6)}
.d-panel-div{width:28px;height:1px;background:var(--gold);margin:16px 0;opacity:.6}
.d-panel-txt.right .d-panel-div{margin-left:auto}

/* ── GALLERY ── */
.d-section{padding:72px 6%;max-width:1200px;margin:0 auto}
.d-section-ey{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:28px;display:block}
.d-gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.d-gallery-grid a{display:block;overflow:hidden;aspect-ratio:4/3;cursor:zoom-in}
.d-gallery-grid a:first-child{grid-column:1/3;grid-row:1/3;aspect-ratio:unset}
.d-gallery-grid img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.d-gallery-grid a:hover img{transform:scale(1.04)}

/* ── PROP MAP ── */
.d-map-container{height:420px;border:1px solid var(--border);overflow:hidden}

/* ── CTA ── */
.d-cta-panel{position:relative;min-height:55vh;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:72px}
.d-cta-bg-img{position:absolute;inset:-15% 0;z-index:0}
.d-cta-bg-img img{width:100%;height:100%;object-fit:cover;filter:brightness(.3) saturate(.6)}
.d-cta-content{position:relative;z-index:2;text-align:center;padding:56px 24px}
.d-cta-eyebrow{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:18px;display:block}
.d-cta-heading{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,3.5vw,46px);font-weight:300;font-style:italic;color:var(--text);margin-bottom:36px;line-height:1.25}
.d-cta-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.d-cta-email{margin-top:24px;font-size:11px;font-weight:300;letter-spacing:2px}
.d-cta-email a{color:rgba(240,235,225,.45);text-decoration:none;transition:color .2s}
.d-cta-email a:hover{color:var(--gold-lt)}
.d-cta-social{display:flex;gap:16px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.d-cta-social-link{color:rgba(240,235,225,.3);transition:color .25s,transform .2s;display:flex;align-items:center}
.d-cta-social-link:hover{color:var(--gold);transform:translateY(-2px)}
.d-cta-social-link svg{width:16px;height:16px}
.btn-g{display:inline-block;padding:14px 34px;background:var(--gold);color:var(--bg);text-decoration:none;font-size:9px;font-weight:500;letter-spacing:3px;text-transform:uppercase;transition:background .25s;cursor:pointer;border:none}
.btn-g:hover{background:var(--gold-lt)}
.btn-o{display:inline-block;padding:13px 34px;border:1px solid rgba(196,163,90,.42);color:rgba(240,235,225,.82);text-decoration:none;font-size:9px;font-weight:300;letter-spacing:3px;text-transform:uppercase;transition:border-color .25s,color .25s;cursor:pointer;background:none}
.btn-o:hover{border-color:var(--gold);color:var(--gold-lt)}

/* ── MAPBOX POPUP — remove tip line ── */
.mapboxgl-popup-tip{display:none!important}
.mapboxgl-popup-content{padding:0!important;border-radius:0!important;background:transparent!important;box-shadow:none!important;border:none!important}

/* ── CONTACT FORM ── */
.prop-form-wrap{max-width:1200px;margin:0 auto;padding:0 6% 100px}
.prop-form-ey{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:block}
.prop-form-ti{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,3.5vw,44px);font-weight:300;font-style:italic;color:var(--text);margin-bottom:48px;line-height:1.2}
.frm-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.frm-r{margin-bottom:24px}
.frm-r label{display:block;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.frm-r input,.frm-r textarea,.frm-r select{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(196,163,90,.2);padding:10px 0;color:var(--text);font-family:'Raleway',sans-serif;font-size:14px;font-weight:300;outline:none;transition:border-color .3s;appearance:none;-webkit-appearance:none}
.frm-r input::placeholder,.frm-r textarea::placeholder{color:rgba(138,132,120,.55);font-weight:300;font-size:13px}
.frm-r input:focus,.frm-r textarea:focus,.frm-r select:focus{border-color:var(--gold)}
.frm-r textarea{resize:none;height:90px}
.frm-r select option{background:#151310;color:var(--text)}
.frm-sub{width:100%;padding:17px;background:var(--gold);color:var(--bg);border:none;font-family:'Raleway',sans-serif;font-size:9.5px;font-weight:500;letter-spacing:4px;text-transform:uppercase;cursor:pointer;transition:background .25s;margin-top:8px}
.frm-sub:hover{background:var(--gold-lt)}
.frm-sub:disabled{background:var(--gold-dk);cursor:default}
/* Form overlay */
#formOverlay{position:fixed;inset:0;z-index:2000;background:rgba(8,8,6,.92);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s}
#formOverlay.open{opacity:1;pointer-events:auto}
.fo-box{text-align:center;padding:52px 40px;max-width:440px}
.fo-icon{font-size:32px;display:block;margin-bottom:20px}
.fo-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;font-style:italic;color:var(--text);margin-bottom:12px}
.fo-sub{font-size:12px;line-height:1.9;color:var(--dim);font-weight:300;margin-bottom:32px}
.fo-btn{background:none;border:1px solid rgba(196,163,90,.4);color:var(--gold-lt);font-family:'Raleway',sans-serif;font-size:9px;font-weight:300;letter-spacing:3px;text-transform:uppercase;padding:12px 36px;cursor:pointer;transition:border-color .25s,color .25s}
.fo-btn:hover{border-color:var(--gold);color:var(--gold)}
@media(max-width:600px){.frm-2{grid-template-columns:1fr}.fo-box{padding:40px 24px}}

/* ── CTA INLINE FORM ── */
.cta-form{margin:28px auto 0;max-width:480px}
.cta-fields{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.cta-inp{width:100%;background:rgba(240,235,225,.1);border:none;border-bottom:1px solid rgba(196,163,90,.55);padding:14px 10px;color:var(--text);font-family:'Raleway',sans-serif;font-size:13px;font-weight:300;outline:none;transition:border-color .3s,background .3s;text-align:center}
.cta-inp::placeholder{color:rgba(240,235,225,.55);font-size:12px;letter-spacing:1px}
.cta-inp:focus{border-color:var(--gold);background:rgba(240,235,225,.14)}
.cta-send{width:100%;padding:15px;background:var(--gold);color:var(--bg);border:none;font-family:'Raleway',sans-serif;font-size:9px;font-weight:500;letter-spacing:4px;text-transform:uppercase;cursor:pointer;transition:background .25s;margin-top:4px}
.cta-send:hover{background:var(--gold-lt)}
.cta-send:disabled{background:var(--gold-dk);cursor:default}
/* ── CTA PHONE SPLIT ── */
.cta-phone-split{display:flex;gap:8px;width:100%}
.cta-dial-inp{width:80px;flex-shrink:0;background:rgba(240,235,225,.1);border:none;border-bottom:1px solid rgba(196,163,90,.55);padding:14px 8px;color:var(--text);font-family:'Raleway',sans-serif;font-size:13px;font-weight:300;outline:none;transition:border-color .3s,background .3s;text-align:center;letter-spacing:1px}
.cta-dial-inp:focus{border-color:var(--gold);background:rgba(240,235,225,.14)}
.cta-dial-inp::placeholder{color:rgba(240,235,225,.45);font-size:12px;letter-spacing:1px}
.cta-phone-split .cta-inp{flex:1}
#propFooter{padding:32px 6%;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-top:0}
.foot-copy{font-size:9px;letter-spacing:2px;color:var(--dim)}
.foot-links{display:flex;gap:24px}
.foot-links a{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color .2s}
.foot-links a:hover{color:var(--gold)}

/* ── LIGHTBOX ── */
#lightbox{position:fixed;inset:0;z-index:1500;background:rgba(8,8,6,.96);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px)}
#lightbox.open{opacity:1;pointer-events:auto}
#lbImg{max-width:88vw;max-height:85vh;object-fit:contain;transform:scale(.96);transition:transform .3s,opacity .2s;cursor:default;display:block;user-select:none;-webkit-user-drag:none}
#lightbox.open #lbImg{transform:scale(1)}
.lb-close{position:absolute;top:20px;right:20px;background:none;border:1px solid rgba(196,163,90,.35);color:var(--gold);font-size:14px;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:border-color .2s,color .2s}
.lb-close:hover{border-color:var(--gold);color:var(--gold-lt)}
.lb-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(8,8,6,.5);border:1px solid rgba(196,163,90,.3);color:rgba(232,213,163,.7);width:44px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:background .2s,border-color .2s,color .2s;backdrop-filter:blur(4px)}
.lb-arrow:hover{background:rgba(196,163,90,.18);border-color:var(--gold);color:var(--gold-lt)}
.lb-arrow svg{width:18px;height:18px;pointer-events:none}
#lbPrev{left:16px}
#lbNext{right:16px}
.lb-counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:7px;align-items:center;z-index:10}
.lb-dot{width:5px;height:5px;border-radius:50%;background:rgba(196,163,90,.25);transition:background .25s,transform .25s;cursor:pointer}
.lb-dot.active{background:var(--gold);transform:scale(1.4)}
@media(max-width:768px){
  .lb-arrow{width:38px;height:38px}
  #lbPrev{left:6px}
  #lbNext{right:6px}
  #lbImg{max-width:94vw;max-height:80vh}
}

/* ── TOAST ── */

function imgUrl(url, w, h){
  if(!url) return '';
  if(url.includes('cloudinary')){
    const t='w_'+w+',q_auto,f_auto,c_fill'+(h?',h_'+h:'');
    if(url.includes('/upload/'+t)) return url;
    return url.replace('/upload/','/upload/'+t+'/');
  }
  return url;
}

function parsePrice(val){ return parseFloat(String(val||'').replace(/[^0-9.]/g,''))||0; }

function formatCurrency(mxnPrice){
  const n=parsePrice(mxnPrice);
  if(!n) return '';
  let amount,sym;
  if(currency==='USD'){amount=n*rates.USD;sym='USD';}
  else if(currency==='CAD'){amount=n*rates.CAD;sym='CAD';}
  else{amount=n;sym='MXN';}
  return sym+' $'+Math.round(amount).toLocaleString('en-US');
}

function parseLocation(locStr){
  if(!locStr) return null;
  const parts=locStr.split(',').map(s=>parseFloat(s.trim()));
  if(parts.length===2&&!isNaN(parts[0])&&!isNaN(parts[1])) return {lat:parts[0],lng:parts[1]};
  return null;
}

function getAllImgs(p){ return IMG_COLS.map(c=>p[c]).filter(u=>u&&u.trim()); }

function isLand(p){
  const t=(p['Tipo propiedad']||'').toLowerCase();
  return t.includes('terreno')||t.includes('land')||t.includes('lote');
}

function parseListingType(raw){
  const v=(raw||'').toLowerCase();
  if(v.includes('sale')) return {es:'En Venta',en:'For Sale',fr:'À Vendre'}[lang]||'For Sale';
  if(v.includes('rent')) return {es:'En Renta',en:'For Rent',fr:'À Louer'}[lang]||'For Rent';
  return raw;
}

function splitDesc(text,n){
  if(!text||!text.trim()) return Array(n).fill('');
  let chunks=text.split(/\n\n+/).map(s=>s.trim()).filter(Boolean);
  if(chunks.length<2){
    const sents=text.match(/[^.!?]+[.!?]+\s*/g)||[text];
    const per=Math.ceil(sents.length/n);
    chunks=[];
    for(let i=0;i<sents.length;i+=per) chunks.push(sents.slice(i,i+per).join('').trim());
  }
  while(chunks.length<n) chunks.push(chunks[chunks.length-1]||'');
  return chunks.slice(0,n);
}

  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));

  const lbl=g('langDdLabel'); if(lbl) lbl.textContent=lang.toUpperCase();

  if(propData) renderProperty(propData);
}

  function translateAmenity(raw){

// ── LIGHTBOX ──
let _lbImgs = [];
let _lbIdx  = 0;
let _lbTouchX = null;

function _lbSetImg(idx, animate){
  const img = g('lbImg');
  _lbIdx = (idx + _lbImgs.length) % _lbImgs.length;
  if(animate){
    img.style.opacity='0';
    img.style.transform='scale(0.94)';
    setTimeout(()=>{
      img.src = imgUrl(_lbImgs[_lbIdx], 1920);
      img.style.opacity='1';
      img.style.transform='scale(1)';
    }, 150);
  } else {
    img.src = imgUrl(_lbImgs[_lbIdx], 1920);
  }
  // dots
  const dots = g('lbCounter');
  if(dots){
    [...dots.children].forEach((d,i)=>d.classList.toggle('active',i===_lbIdx));
  }
  // show/hide arrows
  const single = _lbImgs.length <= 1;
  g('lbPrev').style.display = single ? 'none' : 'flex';
  g('lbNext').style.display = single ? 'none' : 'flex';
}

function openLightbox(idx){
  const imgs = getAllImgs(propData);
  _lbImgs = imgs;
  // build dots (max 12 shown)
  const counter = g('lbCounter');
  const maxDots = 12;
  if(imgs.length > 1 && imgs.length <= maxDots){
    counter.innerHTML = imgs.map((_,i)=>`<span class="lb-dot${i===idx?' active':''}" onclick="event.stopPropagation();_lbSetImg(${i},true)"></span>`).join('');
  } else {
    counter.innerHTML = '';
  }
  _lbSetImg(idx, false);
  g('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeLightbox(){
  g('lightbox').classList.remove('open');
  document.body.style.overflow='';
}

// Keyboard navigation
document.addEventListener('keydown',e=>{
  if(!g('lightbox').classList.contains('open')) return;
  if(e.key==='Escape') closeLightbox();
  if(e.key==='ArrowRight'||e.key==='ArrowDown') _lbSetImg(_lbIdx+1, true);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')  _lbSetImg(_lbIdx-1, true);
});

// Arrow buttons
g('lbPrev').addEventListener('click',e=>{ e.stopPropagation(); _lbSetImg(_lbIdx-1, true); });
g('lbNext').addEventListener('click',e=>{ e.stopPropagation(); _lbSetImg(_lbIdx+1, true); });
g('lbClose').addEventListener('click',e=>{ e.stopPropagation(); closeLightbox(); });

// Click backdrop to close (not on image or arrows)
g('lightbox').addEventListener('click',function(e){
  if(e.target===this) closeLightbox();
});

// Touch swipe
g('lightbox').addEventListener('touchstart',e=>{ _lbTouchX = e.touches[0].clientX; },{passive:true});
g('lightbox').addEventListener('touchend',e=>{
  if(_lbTouchX===null) return;
  const dx = e.changedTouches[0].clientX - _lbTouchX;
  _lbTouchX = null;
  if(Math.abs(dx) < 40) return; // too short
  if(dx < 0) _lbSetImg(_lbIdx+1, true);
  else        _lbSetImg(_lbIdx-1, true);
},{passive:true});

let _propName='';
function shareProperty(){
  const url=window.location.href;
  const toast=g('shareToast');
  const t=L[lang];
  if(typeof gtag==='function') gtag('event','share',{method:navigator.share?'native':'clipboard',content_type:'property',item_id:_propName});
  function showToast(msg){ toast.textContent='✦  '+msg+'  ✦'; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),2800); }
  if(navigator.share){ navigator.share({title:_propName,url}).then(()=>showToast(t.toast.shared)).catch(()=>{}); return; }
  if(navigator.clipboard){ navigator.clipboard.writeText(url).then(()=>showToast(t.toast.copied)).catch(()=>fallback(url,showToast,t.toast.copied)); }
  else fallback(url,showToast,t.toast.copied);
}
function fallback(url,showToast,msg){ const el=document.createElement('input');el.value=url;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);showToast(msg); }

    const r=await fetch('https://open.er-api.com/v6/latest/MXN');
    const d=await r.json();
    if(d.rates){rates.USD=d.rates.USD;rates.CAD=d.rates.CAD;}
  }catch(e){}

  // Fetch sheet
  Papa.parse(SHEET_CSV,{
    download:true,header:true,skipEmptyLines:true,
    complete(res){
      const all=res.data.filter(r=>IMG_COLS.some(c=>r[c]&&r[c].trim()));
      // Find by home_listing_id or Nombre
      const match=all.find(r=>(r['home_listing_id']||'')=== propId)||(all.find(r=>encodeURIComponent(r['Nombre']||'')===propId));
      if(!match){ showError(); return; }
      propData=match;
      _propName=match['Nombre']||'';
      renderProperty(match);
    },
    error(){ showError(); }
  });
}

init();
</script>
</body>
</html>
